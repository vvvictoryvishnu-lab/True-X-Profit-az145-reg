<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE THEORY V12 - PRIVATE SERVER</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 0; text-align: center; }
        .mummy-daddy { color: var(--gold); font-size: 40px; font-weight: 900; margin: 15px 0; }
        .omniverse-tag { color: var(--neon); font-size: 18px; font-weight: bold; letter-spacing: 5px; margin-bottom: 20px; }
        .workspace { display: flex; flex-direction: column; align-items: center; }
        textarea { width: 95%; max-width: 500px; height: 120px; background: #000; color: #00ff44; border: 1px solid #333; padding: 10px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 18px; }
        .btn-row { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .btn-run { padding: 18px 45px; background: #004d40; color: white; border: 2px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 18px 25px; background: #440000; color: white; border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }
        #report { display: none; background: white; color: black; width: 620px; margin: 20px auto; padding: 25px; border: 2px solid #000; text-align: left; }
        .grid-table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; table-layout: fixed; }
        .grid-table td { border: 1px solid #000; padding: 5px 0; height: 60px; vertical-align: middle; }
        .pid-num { font-size: 14px; color: #555; display: block; }
        .res-val { font-size: 24px; display: block; }
        .b-clr { color: var(--blue); } .s-clr { color: var(--red); }
        .status-strip { background: var(--gold); color: black; padding: 10px; font-weight: bold; width: 70%; margin: 10px auto; border-radius: 5px; display: none; }
        @media print {
            body { background: white !important; }
            .no-print, .mummy-daddy, .omniverse-tag, .workspace, .btn-row { display: none !important; }
            #report { display: block !important; border: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="mummy-daddy">MUMMY DADDY</div>
    <div class="omniverse-tag">OMNIVERSE THEORY - VPS SECURED</div>
    <div class="workspace">
        <textarea id="mainInput" placeholder="INPUT DATA"></textarea>
        <div class="status-strip" id="status">CONNECTING TO PRIVATE SERVER...</div>
        <div class="btn-row">
            <button class="btn-clear" onclick="document.getElementById('mainInput').value=''; document.getElementById('report').style.display='none';">CLEAR</button>
            <button class="btn-run" onclick="runOmniverse()">RUN MASTER SCAN</button>
        </div>
    </div>
    <div id="report">
        <div style="font-size:12px; font-weight:bold; border-bottom:1px solid #000; padding-bottom:5px; display:flex; justify-content:space-between;">
            <span>YouTube: True X Profit</span>
            <span>admin@truexprofit.com</span>
        </div>
        <h3 style="text-align:center;">OMNIVERSE THEORY PRECISION REPORT</h3>
        <div id="histDisp" style="font-size:14px; border:1px solid #000; padding:10px; margin-bottom:15px; font-weight:bold;"></div>
        <table class="grid-table"><tbody id="gridBody"></tbody></table>
        <button class="no-print" onclick="window.print()" style="width:100%; padding:15px; margin-top:15px; font-weight:bold; cursor:pointer;">PRINT REPORT</button>
    </div>
    <script>
        const SERVER_URL = "http://46.202.162.155:5000/scan";
        async function runOmniverse() {
            const raw = document.getElementById('mainInput').value.trim();
            if(!raw) return;
            document.getElementById('status').style.display = 'block';
            try {
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: raw })
                });
                const data = await response.json();
                if(data.results) { renderReport(raw, data.results); }
            } catch (e) { alert("Error connecting to Server!"); }
            finally { document.getElementById('status').style.display = 'none'; }
        }
        function renderReport(hist, res) {
            document.getElementById('histDisp').innerText = "HISTORY: " + hist.replace(/\n/g, ' | ').toUpperCase();
            const maj = (l) => l.split("B").length-1 >= l.split("S").length-1 ? "B" : "S";
            let html = "";
            for(let r=0; r<7; r++) {
                html += "<tr>"; let rowS = "";
                for(let c=0; c<7; c++) {
                    let pid = (r*7)+(c+1); let val = res[pid];
                    rowS += val;
                    html += `<td><span class="pid-num">${pid}</span><span class="res-val ${val==='B'?'b-clr':'s-clr'}">${val}</span></td>`;
                }
                html += `<td><span class="res-val">${maj(rowS)}</span></td></tr>`;
            }
            document.getElementById('gridBody').innerHTML = html;
            document.getElementById('report').style.display = "block";
        }
    </script>
</body>
</html>
