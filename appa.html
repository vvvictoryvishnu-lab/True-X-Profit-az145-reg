<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE MASTER PRO - APPA</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 0; text-align: center; }
        
        .master-header { border-bottom: 2px solid #333; padding: 10px 20px; display: flex; justify-content: space-between; font-weight: bold; color: #00ff44; font-size: 13px; }
        .mummy-daddy { color: var(--gold); font-size: 45px; font-weight: 900; margin: 15px 0; }
        .omniverse-tag { color: var(--neon); font-size: 20px; font-weight: bold; letter-spacing: 5px; margin-bottom: 25px; }

        /* Input Area */
        .workspace { display: flex; flex-direction: column; align-items: center; padding: 0 15px; }
        .input-label { color: var(--gold); font-weight: bold; width: 50%; text-align: left; font-size: 16px; margin-bottom: 5px; }
        textarea { width: 100%; max-width: 500px; height: 140px; background: #000; color: #00ff44; border: 2px solid #333; padding: 12px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 18px; }

        /* Grid UI */
        .grid-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 800px; margin: 25px auto; }
        .p-btn { padding: 12px 5px; background: #111; border: 1px solid #333; border-radius: 4px; color: #666; font-size: 11px; font-weight: bold; }
        .active-p { background: var(--neon) !important; color: black !important; border-color: var(--neon); }

        .status-strip { background: #00ff44; color: black; padding: 10px; font-weight: bold; width: 60%; margin: 15px auto; border-radius: 4px; display: none; }
        .btn-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .btn-run { padding: 18px 45px; background: transparent; color: white; border: 2px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 18px 25px; background: #330000; color: white; border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* --- PRINT REPORT (8x8) --- */
        #report { display: none; background: white; color: black; width: 680px; margin: 20px auto; padding: 25px; border: 1px solid #000; text-align: left; }
        .rep-header { font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 5px; }
        
        /* பெரிய இன்புட் ஹிஸ்டரி */
        .hist-box { font-size: 16px; background: #fff; padding: 10px; border: 1px solid #000; margin: 10px 0; font-weight: bold; line-height: 1.6; word-wrap: break-word; }
        
        .verdict-line { font-size: 26px; font-weight: 900; text-align: center; margin: 15px 0; text-transform: uppercase; }
        
        /* 8x8 Compact Matrix Table */
        .grid-table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; table-layout: fixed; }
        .grid-table td { border: 1px solid #000; padding: 10px 2px; font-size: 24px; overflow: hidden; }
        .b-clr { color: var(--blue); }
        .s-clr { color: var(--red); }
        .pid-num { font-size: 10px; color: #777; display: block; margin-bottom: -5px; }

        @media print {
            body { background: white; }
            .no-print, .master-header, .mummy-daddy, .omniverse-tag, .workspace, .btn-row, .grid-container { display: none !important; }
            #report { display: block !important; border: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="master-header">
        <span>YouTube: True X Profit</span>
        <span>vvvictoryvishnu@gmail.com</span>
    </div>

    <div class="mummy-daddy">MUMMY DADDY</div>
    <div class="omniverse-tag">OMNIVERSE THEORY - APPA</div>

    <div class="workspace">
        <!-- Secure Email Login -->
        <input type="email" id="userEmail" placeholder="ENTER REGISTERED EMAIL" 
               style="width:100%; max-width:480px; padding:12px; background:#111; border:1px solid var(--neon); color:white; text-align:center; border-radius:5px; margin-bottom:15px; font-weight:bold; font-size:16px;">
        
        <div class="input-label">INPUT DATA</div>
        <textarea id="mainInput" placeholder=""></textarea>

        <div class="grid-container" id="pGrid"></div>
        <div class="status-strip" id="status">SCANNING 3,62,880 CALCULATIONS... PLEASE WAIT</div>

        <div class="btn-row">
            <button class="btn-clear" onclick="location.reload()">CLEAR</button>
            <button class="btn-run" onclick="validateAndRun()">RUN MASTER SCAN</button>
        </div>
    </div>

    <div id="report">
        <div class="rep-header">
            <span>YouTube: True X Profit</span>
            <span>admin@truexprofit.com</span>
        </div>
        <h2 style="text-align:center; margin:10px 0; font-size:24px;">OMNIVERSE THEORY PRECISION REPORT</h2>
        <div id="histDisp" class="hist-box"></div>
        <div id="verdictLine" class="verdict-line"></div>

        <table class="grid-table">
            <tbody id="gridBody"></tbody>
        </table>

        <p style="text-align:center; font-size:13px; margin-top:30px; font-weight:bold; border-top: 1px solid #000; padding-top: 15px;">
            Dedicated to MUMMY DADDY | Date: <span id="rDate"></span>
        </p>
        <button class="no-print" onclick="window.print()" style="width:100%; padding:15px; margin-top:15px; font-weight:bold; font-size:18px; cursor:pointer; background:#eee; border:2px solid #000;">SAVE / PRINT REPORT</button>
    </div>

    <script>
        const FB_URL = "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let primes = [];

        function init() {
            let lim=500000; let s=new Uint8Array(lim).fill(1);
            for(let i=2;i*i<lim;i++) if(s[i]) for(let j=i*i;j<lim;j+=i) s[j]=0;
            for(let i=2;i<lim;i++) if(s[i]) primes.push(i);

            const g = document.getElementById('pGrid');
            for(let i=1; i<=49; i++) {
                let b = document.createElement('div');
                b.className = 'p-btn active-p'; // All active for Master
                b.innerText = (i < 10 ? '0' : '') + i;
                g.appendChild(b);
            }
        }
        init();

        async function validateAndRun() {
            const email = document.getElementById('userEmail').value.trim().toLowerCase();
            const raw = document.getElementById('mainInput').value.trim();
            if(!email || !raw) { alert("Email and Data required!"); return; }

            document.getElementById('status').innerText = "VERIFYING SECURITY... PLEASE WAIT";
            document.getElementById('status').style.display = 'block';

            try {
                const res = await fetch(`${FB_URL}/users/${email.replace(/\./g, '_')}.json`);
                const user = await res.json();

                // 100% Security Check: அட்மின் ஐடியாக இருந்தாலும் ஸ்டேட்டஸ் செக் செய்யப்படும்
                if(!user || user.status !== "active") {
                    alert("ACCESS DENIED! Contact admin@truexprofit.com");
                    location.reload(); return;
                }

                if(new Date() > new Date(user.expiry)) {
                    alert("LICENSE EXPIRED!"); location.reload(); return;
                }

                runOmniverse(raw);
            } catch(e) { alert("Check Internet Connection!"); }
        }

        function runOmniverse(raw) {
            document.getElementById('status').innerText = "SCANNING 3,62,880 CALCULATIONS... PLEASE WAIT";
            setTimeout(() => {
                let pNums = [];
                raw.split('\n').forEach(ln => {
                    let d = ln.replace(/\D/g, ''); if(d) pNums.push(parseInt(d));
                });

                let base = (pNums.slice(0,4).reduce((a,b)=>a+b, 0) * 2) * 100;
                let results = {};
                for(let pid=1; pid<=49; pid++) {
                    let b=0, s=0;
                    for(let i=0; i<3000; i++) {
                        let target = base + (i * 123);
                        let p = primes[(i + pid * 200) % primes.length];
                        let chk = (target % p === 0) ? Math.floor(target/p) : (target % p);
                        if(chk % 2 !== 0) b++; else s++;
                    }
                    results[pid] = (b >= s ? "B" : "S");
                }
                renderReport(raw.replace(/\n/g, ' | '), results);
            }, 500);
        }

        function renderReport(hist, res) {
            document.getElementById('histDisp').innerText = "HISTORY: " + hist;
            const maj = (l) => l.split("B").length-1 >= l.split("S").length-1 ? "B" : "S";

            let html = "";
            let colData = ["","","","","","",""];

            for(let r=0; r<7; r++) {
                html += "<tr>";
                let rowRes = "";
                for(let c=0; c<7; c++) {
                    let pid = (r*7) + (c+1);
                    let val = res[pid];
                    rowRes += val; colData[c] += val;
                    html += `<td><span class="pid-num">${pid}</span><span class="${val==='B'?'b-clr':'s-clr'}">${val}</span></td>`;
                }
                let rV = maj(rowRes);
                html += `<td style="background:#f9f9f9;" class="${rV==='B'?'b-clr':'s-clr'}">${rV}</td></tr>`;
            }

            let bottomRow = "<tr>";
            let grandVString = "";
            for(let c=0; c<7; c++) {
                let cV = maj(colData[c]);
                grandVString += cV;
                bottomRow += `<td style="background:#f9f9f9;" class="${cV==='B'?'b-clr':'s-clr'}">${cV}</td>`;
            }
            
            let finalV = maj(grandVString);
            bottomRow += `<td style="background:#1a237e; color:#fff; font-size:28px;">${finalV}</td></tr>`;
            
            document.getElementById('gridBody').innerHTML = html + bottomRow;
            let vLine = document.getElementById('verdictLine');
            vLine.innerHTML = finalV === "B" ? "↑ INSTITUTIONAL BUY" : "↓ INSTITUTIONAL SELL";
            vLine.style.color = finalV === "B" ? "blue" : "red";

            document.getElementById('rDate').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('report').style.display = "block";
            document.getElementById('status').style.display = 'none';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
