<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUE X MATRIX PRO - OMNIVERSE</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; text-align: center; }
        
        /* 1. Login Gate */
        #login-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: #111; padding: 40px; border: 2px solid var(--neon); border-radius: 15px; width: 320px; box-shadow: 0 0 20px var(--neon); }
        .login-box input { width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: var(--neon); text-align: center; border-radius: 5px; font-size: 16px; font-weight: bold; }
        .btn-gate { width: 100%; padding: 15px; background: #004d40; color: white; border: 1px solid var(--neon); border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; }

        /* 2. Main Workspace */
        #main-ui { display: none; padding: 10px; }
        .mummy-daddy { color: var(--gold); font-size: 40px; font-weight: 900; margin: 15px 0; }
        .brand-header { border-bottom: 1px solid #333; padding: 10px; font-weight: bold; color: #00ff44; font-size: 12px; display: flex; justify-content: space-between; }
        
        textarea { width: 60%; height: 120px; background: #000; color: #00ff44; border: 1px solid var(--neon); padding: 15px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 17px; margin-top: 20px; }
        
        .mode-selection { margin: 25px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-mode { padding: 12px 20px; border: 1.5px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 12px; }
        .btn-mode.active { background: var(--gold); color: black; }
        
        .btn-row { margin: 20px 0; }
        .btn { padding: 15px 35px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin: 5px; }
        .btn-run { background: #004d40; color: white; border: 2px solid var(--neon); }
        .btn-clear { background: #440000; color: white; border: 1px solid var(--red); }
        
        .status { background: var(--gold); color: black; padding: 10px; font-weight: bold; width: 50%; margin: 15px auto; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <!-- GATEKEEPER LOGIN SCREEN -->
    <div id="login-gate">
        <div class="mummy-daddy">MUMMY DADDY</div>
        <div class="login-box">
            <h3 style="color: var(--neon); margin-top: 0;">USER ACTIVATION</h3>
            <input type="email" id="uMail" placeholder="Registered Email">
            <input type="password" id="uKey" placeholder="Access Key">
            <button class="btn-gate" onclick="verifyLogin()">ENTER WORKSPACE</button>
        </div>
    </div>

    <!-- MAIN OMNIVERSE SCANNER -->
    <div id="main-ui">
        <div class="brand-header">
            <span>YouTube: True X Profit</span>
            <span id="userDisp"></span>
            <span>admin@truexprofit.com</span>
        </div>
        <div class="mummy-daddy">MUMMY DADDY</div>
        <h2 style="color: var(--neon); letter-spacing: 3px;">OMNIVERSE THEORY</h2>

        <textarea id="dataInput" placeholder="PASTE TRADING DATA HERE..."></textarea>
        
        <div class="mode-selection">
            <button class="btn-mode active" id="m81" onclick="setMode(81,9,9)">81 MATRIX (9x9)</button>
            <button class="btn-mode" id="m240" onclick="setMode(240,16,15)">240 MATRIX (16x15)</button>
            <button class="btn-mode" id="m252" onclick="setMode(252,12,21)">252 MATRIX (12x21)</button>
            <button class="btn-mode" style="border-color:#00ff44; color:#00ff44;" id="mall" onclick="setMode('all',0,0)">ALL PRINT (3-IN-1)</button>
        </div>

        <div class="status" id="stBox">CONNECTING TO MASTER VPS... PLEASE WAIT</div>

        <div class="btn-row">
            <button class="btn btn-clear" onclick="document.getElementById('dataInput').value=''">CLEAR DATA</button>
            <button class="btn btn-run" onclick="runOmniverse()">RUN MASTER SCAN</button>
        </div>
    </div>

    <script>
        // ரகசிய ஃபயர்பேஸ் இணைப்பு
        const FB_URL = "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/";

        async function verifyLogin() {
            const email = document.getElementById('uMail').value.trim().toLowerCase();
            const key = document.getElementById('uKey').value.trim();
            if(!email || !key) { alert("Please enter Email and Key!"); return; }

            try {
                const res = await fetch(`${FB_URL}/users/${email.replace(/\./g, '_')}.json`);
                const user = await res.json();
                
                // மாஸ்டர் செக்: ஆக்டிவாக உள்ளதா மற்றும் கீ சரியாக உள்ளதா?
                if(user && String(user.key) === key && user.status === "active") {
                    document.getElementById('login-gate').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'block';
                    document.getElementById('userDisp').innerText = email;
                } else {
                    alert("Invalid Credentials or Account is Blocked!");
                }
            } catch(e) { alert("Internet Connection Error!"); }
        }

        // --- SCANNER LOGIC ---
        let mode = 81, cols = 9, rows = 9;
        function setMode(m, c, r) {
            mode = m; cols = c; rows = r;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById('m' + m).classList.add('active');
        }

        async function runOmniverse() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            document.getElementById('stBox').style.display = 'block';

            try {
                const res = await fetch("http://46.202.162.155:5000/triple_scan", {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({input: raw, mode: mode})
                });
                const data = await res.json();
                if(data.results) openPrintTab(raw, data.results);
            } catch(e) { alert("Server Error! Make sure to allow http://46.202.162.155:5000 in browser."); }
            finally { document.getElementById('stBox').style.display = 'none'; }
        }

        function buildTable(res, c, r) {
            const maj = (l) => {
                let b = l.filter(x=>x==="B").length, s = l.filter(x=>x==="S").length;
                return b > s ? "B" : (s > b ? "S" : "=");
            };
            const clr = (v) => v === "B" ? "blue" : (v === "S" ? "red" : "black");
            
            let html = "<table style='width:100%; border-collapse:collapse; text-align:center; font-weight:bold; font-size:15px; table-layout:fixed;'><tr><th style='border:1.5px solid #000; padding:5px; background:#eee;'>L/D</th>";
            for(let i=1; i<=c; i++) html += `<th style='border:1.5px solid #000; padding:5px; background:#eee;'>${i<10?'0':''}${i}</th>`;
            html += "<th style='border:1.5px solid #000; padding:5px; background:#e3f2fd;'>TO</th></tr>";

            let colD = Array.from({length: c}, () => []), rMaj = [];
            for(let i=0; i<r; i++) {
                let row = res.slice(i*c, (i+1)*c);
                let rv = maj(row); rMaj.push(rv);
                html += `<tr><td style='border:1.5px solid #000; padding:5px; background:#f9f9f9;'>${(i+1)<10?'0':''}${i+1}</td>`;
                row.forEach((v, idx) => {
                    colD[idx].push(v);
                    html += `<td style='border:1.5px solid #000; padding:5px; color:${clr(v)}'>${v}</td>`;
                });
                html += `<td style='border:1.5px solid #000; padding:5px; background:#f0f7ff; color:${clr(rv)}'>${rv}</td></tr>`;
            }
            
            html += "<tr style='background:#f0f7ff;'><td>TO</td>";
            let toRow = colD.map(col => {
                let v = maj(col); html += `<td style='border:1.5px solid #000; padding:5px; color:${clr(v)}'>${v}</td>`; return v;
            });
            let finalV = maj(toRow);
            html += `<td style='border:2.5px solid #000; padding:5px; font-size:24px; color:${clr(finalV)}'>${finalV}</td></tr></table>`;
            return html + `<div style='text-align:right; font-size:24px; font-weight:900; margin-top:10px; color:${clr(finalV)}'> = ${finalV}</div>`;
        }

        function openPrintTab(raw, results) {
            const win = window.open('', '_blank');
            const hist = raw.replace(/\n/g, ' | ').toUpperCase();
            let content = "";
            if(mode === "all") {
                content = "<h2>81 MATRIX (9x9)</h2>" + buildTable(results["81"],9,9) + 
                          "<div style='page-break-after:always; margin-top:30px; border-top:1px dashed #ccc;'></div><h2>240 MATRIX (16x15)</h2>" + buildTable(results["240"],16,15) + 
                          "<div style='page-break-after:always; margin-top:30px; border-top:1px dashed #ccc;'></div><h2>252 MATRIX (12x21)</h2>" + buildTable(results["252"],12,21);
            } else {
                content = `<h2>${mode} MATRIX</h2>` + buildTable(results, cols, rows);
            }
            
            win.document.write(`
                <html><head><title>OMNIVERSE REPORT</title></head>
                <body style='font-family:Arial; padding:20px; background:white; color:black; text-align:center;'>
                    <div style='display:flex; justify-content:space-between; font-size:12px; font-weight:bold; border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:15px;'>
                        <span>YouTube: True X Profit</span><span>admin@truexprofit.com</span>
                    </div>
                    <h2 style='color:#1a237e;'>GLOBAL PRECISION REPORT</h2>
                    <div style='font-size:15px; border:2px solid #000; padding:10px; margin-bottom:20px; font-weight:900; word-break:break-all; text-align:left; background:#f9f9f9;'>HISTORY: ${hist}</div>
                    ${content}
                    <p style='font-size:12px; margin-top:30px; font-weight:bold;'>Dedicated to MUMMY DADDY | Date: ${new Date().toLocaleDateString('en-GB')}</p>
                    <button onclick='window.print()' style='width:100%; padding:15px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:20px; background:#eee; border:2px solid #000;'>SAVE / PRINT PDF</button>
                </body></html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
