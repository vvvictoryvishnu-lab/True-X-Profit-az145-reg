<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZ 145 MATRIX - TrueX Profit</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background:#0a001f; color:white; margin:0; padding:20px; }
    .form-box { max-width:600px; margin:40px auto; background:rgba(0,0,0,0.85); padding:30px; border-radius:15px; border:2px solid #00ff9d; }
    input, select { width:100%; padding:14px; margin:12px 0; background:#1a0033; border:1px solid #00ff9d; color:white; border-radius:8px; }
    button { width:100%; padding:16px; background:#00cc66; color:black; font-size:1.3rem; font-weight:bold; border:none; border-radius:10px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="form-box">
    <h2 style="text-align:center; color:#00ffcc;">AZ 145 MATRIX</h2>
    <h3 style="text-align:center;">True X Profit Registration</h3>

    <form id="regForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="tel" id="mobile" placeholder="WhatsApp Number" required>
      <input type="text" id="symbols" placeholder="Trading Symbols (GOLD, BTC, EURUSD)" required>
      <select id="plan">
        <option value="1">1 Day Plan</option>
        <option value="10">10 Days Plan</option>
        <option value="30" selected>30 Days Plan</option>
        <option value="60">60 Days Plan</option>
        <option value="90">90 Days Plan</option>
      </select>
      <button type="submit">SUBMIT DETAILS</button>
    </form>
  </div>

  <script>
    const firebaseConfig = { databaseURL: "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    document.getElementById('regForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const data = {
        name: document.getElementById('name').value.trim(),
        mobile: document.getElementById('mobile').value.trim(),
        symbols: document.getElementById('symbols').value.trim(),
        plan: document.getElementById('plan').value,
        time: new Date().toLocaleString()
      };

      const safeEmail = document.getElementById('email').value.trim().toLowerCase().replace(/\./g, "_");

      db.ref('leads/' + safeEmail).set(data)
        .then(() => {
          alert("✅ Registration Successful!\n\nAdmin will review and send Activation Key shortly.");
          document.getElementById('regForm').reset();
        })
        .catch(err => alert("Error: " + err.message));
    });
  </script>
</body>
</html>
