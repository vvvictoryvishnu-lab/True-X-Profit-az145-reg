<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE THEORY - Master Secure System</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 10px; }
        
        .header-brand { border-bottom: 2px solid #333; padding: 10px; font-size: 13px; color: #00ff44; display: flex; justify-content: space-between; }
        .mummy-daddy { color: var(--gold); font-size: 42px; font-weight: 900; text-align: center; margin: 15px 0; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .logo-sub { color: var(--neon); font-size: 20px; text-align: center; font-weight: bold; letter-spacing: 4px; margin-bottom: 25px; }

        /* மாஸ்டர் கேட்ட 'பாதி அகல' இன்புட் பாக்ஸ் */
        .workspace { display: flex; flex-direction: column; align-items: center; width: 100%; }
        textarea { width: 50%; height: 140px; background: #000; color: #00ff44; border: 2px solid #333; padding: 12px; font-family: 'Consolas', monospace; border-radius: 10px; font-size: 16px; transition: border 0.3s; }
        textarea:focus { border-color: var(--neon); outline: none; }

        /* 49 Parts - 7x7 Grid */
        .master-grid { margin-top: 30px; width: 95%; max-width: 1000px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .part-box { background: #111; border: 1px solid #222; padding: 15px 5px; border-radius: 5px; text-align: center; font-size: 12px; font-weight: bold; color: #444; transition: 0.3s; cursor: not-allowed; }
        
        /* அட்மின் டிக் செய்த பார்ட்டுகள் மட்டும் */
        .unlocked { border: 1px solid var(--neon); color: var(--neon); cursor: pointer; box-shadow: 0 0 5px var(--neon); }
        .active-scan { background: var(--neon) !important; color: black !important; }

        .btn-scan { margin: 30px; padding: 20px 60px; background: #004d40; color: white; border: 2px solid var(--neon); border-radius: 8px; cursor: pointer; font-size: 22px; font-weight: bold; text-transform: uppercase; }
        
        /* Report Print Logic */
        #report { display: none; background: white; color: black; padding: 30px; width: 550px; margin: 20px auto; border: 1px solid #000; text-align: left; }
        .admin-only { display: none; color: #d32f2f; font-weight: bold; border: 1px dashed red; padding: 5px; margin: 10px 0; }
        
        @media print {
            body * { display: none; }
            #report, #report * { display: block; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="header-brand">
        <span>YouTube: True X Profit</span>
        <span>vvvictoryvishnu@gmail.com</span>
    </div>

    <div class="mummy-daddy">MUMMY DADDY</div>
    <div class="logo-sub">OMNIVERSE THEORY</div>

    <div class="workspace">
        <textarea id="dataInput" placeholder="PASTE TRADING DATA HERE... (O, H, L, C)"></textarea>
        
        <!-- 49 பார்ட்டுகள் இங்கே உருவாகும் -->
        <div class="master-grid" id="grid49"></div>

        <button class="btn-scan" onclick="processOmniverse()">RUN MASTER SCAN</button>
    </div>

    <!-- ரிப்போர்ட் பகுதி -->
    <div id="report">
        <div style="font-size: 12px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between;">
            <span>YouTube: True X Profit</span>
            <span>vvvictoryvishnu@gmail.com</span>
        </div>
        
        <h2 style="text-align: center; color: #1a237e; margin: 10px 0;">OMNIVERSE THEORY REPORT</h2>
        
        <div id="histDisp" style="font-size: 11px; background: #f9f9f9; padding: 8px; border: 1px solid #ddd; margin-bottom: 10px; font-weight: bold;"></div>

        <!-- அட்மினுக்கு மட்டும் தெரியும் BASE எண் -->
        <div id="adminBase" class="admin-only">ADMIN VIEW - BASE ID: <span id="baseVal"></span></div>

        <div id="instVerdict" style="border: 3px solid red; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px;"></div>

        <table style="width: 100%; border-collapse: collapse; text-align: center; font-size: 18px; font-weight: bold;">
            <thead><tr style="background: #eee;"><th style="border:1px solid #888; padding:8px;">PART ID</th><th style="border:1px solid #888; padding:8px;">MATRIX RESULT</th></tr></thead>
            <tbody id="reportTableBody"></tbody>
        </table>

        <p style="text-align:center; font-size:12px; margin-top:40px; font-weight:bold; border-top: 1px solid #000; padding-top: 15px;">
            Dedicated to MUMMY DADDY | Date: <span id="printDate"></span>
        </p>
        
        <button class="no-print" onclick="window.print()" style="width:100%; padding:15px; background:#f0f0f0; border:2px solid #333; font-weight:bold; margin-top:20px; cursor:pointer;">SAVE / PRINT REPORT</button>
    </div>

    <script>
        const grid = document.getElementById('grid49');
        let isAdmin = false; // இது லாகின் செய்யும்போது சர்வரிடமிருந்து மாறும்

        // 7 Groups x 7 Parts (49 Total) உருவாக்கம்
        for(let i=1; i<=49; i++) {
            let div = document.createElement('div');
            div.className = 'part-box';
            div.id = 'part-' + i;
            div.innerText = 'PART ' + i;
            grid.appendChild(div);
        }

        // அட்மின் டிக் செய்ததை மட்டும் அன்லாக் செய்யும் ரகசியச் செயல்பாடு
        function setupAccess(allowedParts, adminStatus) {
            isAdmin = adminStatus;
            allowedParts.forEach(pid => {
                let el = document.getElementById('part-' + pid);
                if(el) el.classList.add('unlocked');
            });
        }

        // உதாரணத்திற்கு: கஸ்டமர் 1 முதல் 7 வரை மட்டுமே வாங்கியுள்ளார், அவர் அட்மின் இல்லை
        setupAccess([1, 2, 3, 4, 5, 6, 7], false); 
        
        // ஒருவேளை நீங்கள் (ADMIN) லாகின் செய்தால் இது இப்படி மாறும்:
        // setupAccess([1, 2, 3... 49], true);

        function processOmniverse() {
            const input = document.getElementById('dataInput').value;
            if(!input) return;

            // அட்மினாக இருந்தால் மட்டும் BASE தெரியவைக்கும் லாஜிக்
            if(isAdmin) {
                document.getElementById('adminBase').style.display = 'block';
                document.getElementById('baseVal').innerText = "93076600 (SECRET)";
            }

            document.getElementById('report').style.display = 'block';
            document.getElementById('printDate').innerText = new Date().toLocaleDateString('en-GB');
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
