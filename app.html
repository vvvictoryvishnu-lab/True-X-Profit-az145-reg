<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZAXS OMNIVERSE - SECURE</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #020202; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 0; user-select: none; }
        .wrapper { max-width: 900px; margin: auto; padding: 15px; text-align: center; }
        h1 { color: var(--gold); font-family: 'Arial Black'; font-size: 32px; margin: 10px 0; }
        .sub { color: var(--neon); font-size: 13px; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }
        textarea { width: 100%; height: 180px; background: #080808; color: #00FF44; border: 1px solid #333; border-radius: 8px; padding: 12px; font-family: 'Consolas', monospace; font-size: 16px; outline: none; margin-top: 20px; transition: 0.3s; }
        textarea:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,229,255,0.2); }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 16px; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn-run { background: #004d40; color: var(--neon); border: 1px solid var(--neon); }
        .btn-clear { background: #330000; color: white; border: none; }
        #status { margin: 15px 0; font-size: 13px; color: var(--gold); font-weight: bold; height: 20px; }
        #rep-area { background: white; color: black; padding: 20px; border-radius: 5px; display: none; text-align: left; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 550px; margin-left: auto; margin-right: auto; }
        .inst-box { border: 3px solid; text-align: center; font-size: 20px; font-weight: bold; padding: 10px; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; font-size: 18px; }
        th, td { border: 1px solid #aaa; padding: 8px; }
        .b-text { color: var(--blue); } .s-text { color: var(--red); }
        #log-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .log-box { background: #111; padding: 30px; border-radius: 12px; border: 1px solid var(--gold); width: 85%; max-width: 330px; }
        @media print {
            body { background: white; }
            .btn-group, #status, textarea, h1, .sub, #log-overlay, .header-branding { display: none !important; }
            #rep-area { display: block !important; box-shadow: none; padding: 0; width: 100%; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="log-overlay">
        <h1 style="margin-bottom: 20px;">MUMMY DADDY</h1>
        <div class="log-box">
            <h3 style="color:var(--gold); text-align:center;">MASTER LOGIN</h3>
            <input type="email" id="u-mail" style="width:100%; padding:14px; margin-bottom:15px; box-sizing:border-box; border-radius:5px; border:none;" placeholder="Enter Your Email">
            <button class="btn btn-run" style="width:100%;" onclick="vUser()">ACTIVATE</button>
            <p id="msg" style="color:red; font-size:12px; text-align:center; margin-top:10px;"></p>
        </div>
    </div>

    <div class="wrapper">
        <div class="header-branding" style="display:flex; justify-content:space-between; font-size:13px; font-weight:bold; border-bottom:1px solid #222; padding-bottom:5px;">
            <span style="color:#00ff44;">YouTube: True X Profit</span>
            <span style="color:var(--blue);">vvvictoryvishnu@gmail.com</span>
        </div>
        <h1>MUMMY DADDY</h1>
        <div class="sub">GLOBAL PRECISION D2 OMNIVERSE</div>

        <!-- ரகசிய இன்புட் பாக்ஸ் -->
        <textarea id="u-input" placeholder="input numbers here (1 to 20 lines)"></textarea>
        
        <div id="status">READY FOR SCAN</div>
        
        <div class="btn-group">
            <button class="btn btn-clear" onclick="document.getElementById('u-input').value='';">CLEAR DATA</button>
            <button class="btn btn-run" onclick="eLogic()">RUN PRO SCAN (PC + MOBILE)</button>
        </div>

        <div id="rep-area">
            <div style="font-size:11px; border-bottom:1px solid #000; padding-bottom:5px; display:flex; justify-content:space-between; font-weight:bold;">
                <span style="color:green;">YouTube: True X Profit</span>
                <span style="color:blue;">vvvictoryvishnu@gmail.com</span>
            </div>
            <h2 style="text-align:center; margin:10px 0; font-size:20px; color:#1a237e;">TRUE X PROFIT OMNIVERSE</h2>
            <div id="r-hist" style="background:#f5f5f5; padding:10px; font-size:11px; font-weight:bold; margin-bottom:12px; border:1px solid #ddd; word-break:break-all; line-height:1.4;"></div>
            <div id="r-inst" class="inst-box"></div>
            <table>
                <thead><tr><th>LAYER</th><th>D2 RESULT</th></tr></thead>
                <tbody id="r-body"></tbody>
                <tr style="background:#f0f4ff;"><td style="color:red;">TOTAL</td><td id="r-total" style="font-size:24px;"></td></tr>
            </table>
            <div style="text-align:center; margin-top:15px; font-size:11px; font-weight:bold;">Dedicated to MUMMY DADDY | Date: <span id="r-date"></span></div>
            <button class="btn btn-run" style="background:var(--neon); color:black; width:100%; margin-top:20px;" onclick="window.print()">PRINT / SAVE PDF</button>
        </div>
    </div>

    <script>
        const _u = "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/";

        async function vUser() {
            const m = document.getElementById('u-mail').value.trim().toLowerCase();
            if(!m) return;
            try {
                const r = await fetch(`${_u}/users/${m.replace(/\./g, '_')}.json`);
                const d = await r.json();
                if(d && d.status === "active") document.getElementById('log-overlay').style.display = 'none';
                else document.getElementById('msg').innerText = "Access Denied!";
            } catch(e) { document.getElementById('msg').innerText = "Network Error!"; }
        }

        // --- புதிய ரகசிய கணக்கீடு (எண்களை மட்டும் எடுக்கும்) ---
        function eLogic() {
            const r = document.getElementById('u-input').value.trim();
            if(!r) return;
            document.getElementById('status').innerText = "SCANNING... PLEASE WAIT";

            setTimeout(() => {
                const lines = r.split('\n').filter(l => l.trim() !== "");
                let allNums = [];
                let h = [];
                
                lines.forEach(ln => {
                    const digits = ln.match(/\d+/g);
                    if(digits) {
                        digits.forEach(num => allNums.push(parseInt(num)));
                    }
                    // ஹிஸ்டரிக்காக வரியை அப்படியே எடுத்துக்கொள்வோம்
                    h.push(ln.trim().toUpperCase());
                });

                if(allNums.length === 0) {
                    document.getElementById('status').innerText = "ERROR: NO NUMBERS FOUND";
                    return;
                }

                // முதல் 4 எண்களை எடுத்து ரகசிய கூட்டுத்தொகை (Base) காணுதல்
                // 1 வரி இருந்தாலும் சரி, 20 வரி இருந்தாலும் சரி இது வேலை செய்யும்
                const _0xa = allNums.slice(0,4).reduce((a,b)=>a+b,0);
                const _0xb = (_0xa * 2) * 100;
                
                let s = [];
                for(let i=7; i<=15; i++) {
                    let _0xc = (_0xb + i) % (i * 23) % 2 !== 0 ? "B" : "S";
                    s.push(_0xc);
                }
                fRep(h.join(" | "), _0xb, s);
            }, 800);
        }

        function fRep(hi, ba, rs) {
            document.getElementById('r-hist').innerHTML = `HISTORY: ${hi}<br><span style="color:red; font-size:13px;">BASE: ${ba}</span>`;
            const b = document.getElementById('r-body'); b.innerHTML = "";
            rs.forEach((v, i) => {
                const c = v === "B" ? "b-text" : "s-text";
                b.innerHTML += `<tr><td>L${i+7 < 10 ? '0'+(i+7) : i+7}</td><td class="${c}">${v}</td></tr>`;
            });
            const bc = rs.filter(x => x === "B").length;
            const fv = bc >= 5 ? "B" : "S";
            const fc = fv === "B" ? "var(--blue)" : "var(--red)";
            const inB = document.getElementById('r-inst');
            inB.innerText = `? INSTITUTIONAL ${fv === "B" ? "BUY" : "SELL"}`;
            inB.style.borderColor = fc; inB.style.color = fc;
            document.getElementById('r-total').innerText = fv;
            document.getElementById('r-total').className = fv === "B" ? "b-text" : "s-text";
            document.getElementById('r-date').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('status').innerText = "SCAN COMPLETE";
            document.getElementById('rep-area').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
