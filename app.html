<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE MASTER PRO - APPA</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 0; text-align: center; }
        
        .master-header { border-bottom: 2px solid #333; padding: 10px 20px; display: flex; justify-content: space-between; font-weight: bold; color: #00ff44; font-size: 13px; }
        .mummy-daddy { color: var(--gold); font-size: 40px; font-weight: 900; margin: 15px 0; }
        .omniverse-tag { color: var(--neon); font-size: 18px; font-weight: bold; letter-spacing: 5px; margin-bottom: 20px; }

        /* Input Area - Clean & Anonymous */
        .workspace { display: flex; flex-direction: column; align-items: center; padding: 0 15px; }
        .input-label { color: var(--gold); font-weight: bold; width: 50%; text-align: left; font-size: 14px; margin-bottom: 5px; }
        textarea { width: 100%; max-width: 500px; height: 140px; background: #000; color: #00ff44; border: 2px solid #333; padding: 12px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 16px; }

        /* Grid */
        .grid-container { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; max-width: 800px; margin: 25px auto; padding: 0 10px; }
        .p-btn { padding: 12px 5px; background: #111; border: 1px solid #333; border-radius: 4px; color: #666; font-size: 11px; font-weight: bold; }
        .active-p { background: var(--neon) !important; color: black !important; border-color: var(--neon); }

        .status-strip { background: #00ff44; color: black; padding: 10px; font-weight: bold; width: 60%; margin: 15px auto; border-radius: 4px; display: none; }
        .btn-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .btn-run { padding: 18px 45px; background: transparent; color: white; border: 2px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 18px 25px; background: #330000; color: white; border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* PRINT REPORT - 8x8 Matrix */
        #report { display: none; background: white; color: black; width: 650px; margin: 20px auto; padding: 25px; border: 1px solid #000; text-align: left; }
        .rep-header { font-size: 11px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #000; padding-bottom: 5px; }
        .hist-box { font-size: 13px; background: #fff; padding: 10px; border: 1px solid #000; margin: 10px 0; font-weight: bold; }
        .verdict-line { font-size: 22px; font-weight: 900; text-align: center; margin: 15px 0; }
        
        .grid-table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; background: white; }
        .grid-table td { border: 1px solid #000; padding: 8px; font-size: 18px; }
        .b-clr { color: var(--blue); }
        .s-clr { color: var(--red); }
        .to-box { background: #f0f0f0; font-size: 20px; } /* Gray background for sub-totals */

        @media print {
            body { background: white; }
            .no-print, .master-header, .mummy-daddy, .omniverse-tag, .workspace, .btn-row, .grid-container { display: none !important; }
            #report { display: block !important; border: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="master-header">
        <span>YouTube: True X Profit</span>
        <span>vvvictoryvishnu@gmail.com</span>
    </div>

    <div class="mummy-daddy">MUMMY DADDY</div>
    <div class="omniverse-tag">OMNIVERSE THEORY - APPA</div>

    <div class="workspace">
        <div class="input-label">INPUT DATA</div>
        <textarea id="mainInput" placeholder=""></textarea> <!-- மாஸ்டர் கேட்ட காலியான பாக்ஸ் -->

        <div class="grid-container" id="pGrid"></div>
        <div class="status-strip" id="status">SCANNING 3,62,880 CALCULATIONS... PLEASE WAIT</div>

        <div class="action-row btn-row">
            <button class="btn-clear" onclick="location.reload()">CLEAR</button>
            <button class="btn-run" onclick="runOmniverse()">RUN MASTER SCAN</button>
        </div>
    </div>

    <div id="report">
        <div class="rep-header">
            <span>YouTube: True X Profit</span>
            <span>admin@truexprofit.com</span>
        </div>
        <h3 style="text-align:center; margin:5px 0;">OMNIVERSE THEORY PRECISION REPORT</h3>
        <div id="histDisp" class="hist-box"></div>
        <div id="verdictLine" class="verdict-line"></div>

        <table class="grid-table">
            <tbody id="gridBody"></tbody>
        </table>

        <p style="text-align:center; font-size:12px; margin-top:20px; font-weight:bold; border-top: 1px solid #000; padding-top: 10px;">
            Dedicated to MUMMY DADDY | Date: <span id="rDate"></span>
        </p>
        <button class="no-print" onclick="window.print()" style="width:100%; padding:12px; margin-top:10px; font-weight:bold; cursor:pointer;">SAVE / PRINT REPORT</button>
    </div>

    <script>
        let primes = [];
        function init() {
            let lim=600000; let s=new Uint8Array(lim).fill(1);
            for(let i=2;i*i<lim;i++) if(s[i]) for(let j=i*i;j<lim;j+=i) s[j]=0;
            for(let i=2;i<lim;i++) if(s[i]) primes.push(i);

            const g = document.getElementById('pGrid');
            for(let i=1; i<=49; i++) {
                let b = document.createElement('div');
                b.className = 'p-btn unlocked active-p'; // Default All On for Master
                b.innerText = (i < 10 ? '0' : '') + i;
                g.appendChild(b);
            }
        }
        init();

        function runOmniverse() {
            const raw = document.getElementById('mainInput').value;
            if(!raw) return;
            document.getElementById('status').style.display = 'block';
            
            setTimeout(() => {
                let pNums = [];
                raw.split('\n').forEach(ln => {
                    let d = ln.replace(/\D/g, ''); if(d) pNums.push(parseInt(d));
                });

                // Stability Fix: Uses Fixed Divisor & Primes
                let base = (pNums.slice(0,4).reduce((a,b)=>a+b, 0) * 2) * 100;
                let results = {};
                for(let pid=1; pid<=49; pid++) {
                    let b=0, s=0;
                    for(let i=0; i<3000; i++) {
                        let target = base + (i * 123);
                        // Fixed Slice per Part ensures stable results
                        let p = primes[(i + pid * 200) % primes.length];
                        let chk = (target % p === 0) ? Math.floor(target/p) : (target % p);
                        if(chk % 2 !== 0) b++; else s++;
                    }
                    results[pid] = (b >= s ? "B" : "S");
                }
                renderReport(raw.replace(/\n/g, ' | '), results);
            }, 800);
        }

        function renderReport(hist, res) {
            document.getElementById('histDisp').innerText = "HISTORY: " + hist;
            const maj = (l) => l.count("B") >= l.count("S") ? "B" : "S";
            String.prototype.count=function(c) { return this.split(c).length-1; };

            let html = "";
            let colData = ["","","","","","",""]; // To track columns for vertical TOT

            for(let r=0; r<7; r++) {
                html += "<tr>";
                let rowRes = "";
                for(let c=0; c<7; c++) {
                    let pid = (r*7) + (c+1);
                    let val = res[pid];
                    rowRes += val;
                    colData[c] += val;
                    html += `<td><span style="font-size:9px; color:#555;">${pid}</span><br><span class="${val==='B'?'b-clr':'s-clr'}">${val}</span></td>`;
                }
                // Horizontal Total (TO)
                let rV = maj(rowRes);
                html += `<td class="to-box ${rV==='B'?'b-clr':'s-clr'}">${rV}</td></tr>`;
            }

            // Bottom Vertical Total Row
            let bottomRow = "<tr>";
            let grandVString = "";
            for(let c=0; c<7; c++) {
                let cV = maj(colData[c]);
                grandVString += cV;
                bottomRow += `<td class="to-box ${cV==='B'?'b-clr':'s-clr'}">${cV}</td>`;
            }
            
            // Grand Final Intersection
            let finalV = maj(grandVString);
            bottomRow += `<td style="background:#000; color:#fff; font-size:24px;">${finalV}</td></tr>`;
            
            document.getElementById('gridBody').innerHTML = html + bottomRow;
            
            let vLine = document.getElementById('verdictLine');
            vLine.innerHTML = finalV === "B" ? "↑ BUY" : "↓ SELL";
            vLine.style.color = finalV === "B" ? "blue" : "red";

            document.getElementById('rDate').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('report').style.display = "block";
            document.getElementById('status').style.display = 'none';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
