<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUE X PROFIT OMNIVERSE</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 0; text-align: center; }
        .mummy-daddy { color: var(--gold); font-size: 38px; font-weight: 900; margin: 15px 0; }
        .header-top { border-bottom: 2px solid #333; padding: 8px 20px; color: #00ff44; font-size: 12px; display: flex; justify-content: space-between; font-weight: bold; }
        textarea { width: 90%; max-width: 500px; height: 110px; background: #000; color: #00ff44; border: 2px solid #333; padding: 10px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 17px; margin: 15px 0; }
        .btn-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .btn-run { padding: 15px 40px; background: #004d40; color: white; border: 2px solid var(--neon); border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 15px 20px; background: #440000; color: white; border: 1px solid var(--red); border-radius: 6px; font-weight: bold; cursor: pointer; }
        #report { display: none; background: white; color: black; width: 620px; margin: 20px auto; padding: 25px; border: 2px solid #000; text-align: left; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; table-layout: fixed; }
        td { border: 1px solid #000; padding: 5px 0; height: 60px; vertical-align: middle; }
        .p-num { font-size: 15px; color: #555; display: block; margin-bottom: -5px; }
        .r-val { font-size: 24px; display: block; font-weight: 900; }
        .b-clr { color: var(--blue); } .s-clr { color: var(--red); }
        @media print { body { background: white !important; } .no-print, .mummy-daddy, textarea, .btn-row, .header-top { display: none !important; } #report { display: block !important; border: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>
    <div class="header-top"><span>YouTube: True X Profit</span><span>admin@truexprofit.com</span></div>
    <div class="mummy-daddy">MUMMY DADDY</div>
    <textarea id="dataInput" placeholder="PASTE DATA HERE"></textarea>
    <div class="btn-row no-print">
        <button class="btn-clear" onclick="document.getElementById('dataInput').value=''; document.getElementById('report').style.display='none';">CLEAR</button>
        <button class="btn-run" onclick="runScan()">RUN MATRIX SCAN</button>
    </div>
    <div id="report">
        <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:bold; border-bottom:1.5px solid #000; padding-bottom:5px;">
            <span>YouTube: True X Profit</span><span>vvvictoryvishnu@gmail.com</span>
        </div>
        <h3 style="text-align:center; margin:10px 0;">OMNIVERSE THEORY PRECISION REPORT</h3>
        <div id="histDisp" style="font-size:13px; background:#f2f2f2; padding:10px; border:1px solid #000; margin-bottom:10px; font-weight:bold; word-wrap: break-all;"></div>
        <table id="resTable"></table>
        <p style="text-align:center; font-size:12px; margin-top:20px; font-weight:bold; border-top:1px solid #000; padding-top:10px;">Dedicated to MUMMY DADDY</p>
        <button class="btn-run no-print" style="width:100%; background:white; color:black; margin-top:15px;" onclick="window.print()">PRINT / SAVE REPORT</button>
    </div>
    <script>
        async function runScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            try {
                // இப்போது நாம் நேரடியாக டொமைன் வழியாகத் தொடர்பு கொள்கிறோம்
                const response = await fetch("http://truexprofit.com/omniverse_scan", {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({input: raw})
                });
                const data = await response.json();
                if(data.results) renderTable(raw, data.results);
            } catch(e) { alert("Server Busy! Please try again in 5 seconds."); }
        }
        function renderTable(raw, res) {
            document.getElementById('histDisp').innerText = "HISTORY: " + raw.replace(/\n/g, ' | ').toUpperCase();
            const maj = (l) => l.split("B").length-1 >= l.split("S").length-1 ? "B" : "S";
            let html = ""; let colData = ["","","","","","",""];
            for(let r=0; r<7; r++) {
                html += "<tr>"; let rowS = "";
                for(let c=0; c<7; c++) {
                    let pid = (r*7)+(c+1); let v = res[pid.toString()];
                    rowS += v; colData[c] += v;
                    html += `<td><span class="p-num">${pid}</span><span class="r-val ${v==='B'?'b-clr':'s-clr'}">${v}</span></td>`;
                }
                let rV = maj(rowS); html += `<td style="background:#f9f9f9;"><span class="r-val ${rV==='B'?'b-clr':'s-clr'}">${rV}</span></td></tr>`;
            }
            let bRow = "<tr>"; let grandStr = "";
            for(let c=0; c<7; c++) {
                let cV = maj(colData[c]); grandStr += cV;
                bRow += `<td style="background:#f9f9f9;"><span class="r-val ${cV==='B'?'b-clr':'s-clr'}">${cV}</span></td>`;
            }
            let fV = maj(grandStr); bRow += `<td style="background:#e3f2fd; font-size:30px;" class="${fV==='B'?'b-clr':'s-clr'}">${fV}</td></tr>`;
            document.getElementById('resTable').innerHTML = html + bRow;
            document.getElementById('report').style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
