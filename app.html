<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE THEORY - TRUE X PROFIT</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 0; text-align: center; }
        
        .master-header { border-bottom: 2px solid #333; padding: 10px 20px; display: flex; justify-content: space-between; font-weight: bold; color: #00ff44; font-size: 13px; }
        .mummy-daddy { color: var(--gold); font-size: 45px; font-weight: 900; margin: 15px 0; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .omniverse-tag { color: var(--neon); font-size: 20px; font-weight: bold; letter-spacing: 5px; margin-bottom: 25px; }

        /* Input Area */
        .workspace { display: flex; flex-direction: column; align-items: center; }
        .input-label { color: var(--gold); font-weight: bold; margin-bottom: 5px; font-size: 14px; width: 50%; text-align: left; }
        textarea { width: 50%; height: 140px; background: #000; color: #00ff44; border: 2px solid #333; padding: 12px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 16px; }

        /* 49 Grid */
        .grid-49 { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-width: 900px; margin: 25px auto; padding: 0 10px; }
        .part-btn { padding: 15px 5px; background: #111; border: 1px solid #222; border-radius: 5px; color: #444; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .unlocked { border-color: var(--neon); color: var(--neon); }
        .active-p { background: var(--neon) !important; color: black !important; box-shadow: 0 0 15px var(--neon); }

        /* Status & Buttons */
        .status-bar { background: #00ff44; color: black; padding: 12px; font-weight: bold; width: 50%; margin: 15px auto; border-radius: 5px; display: none; }
        .btn-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .btn-run { padding: 18px 45px; background: transparent; color: white; border: 2px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 18px 25px; background: #330000; color: white; border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Report */
        #report { display: none; background: white; color: black; width: 95%; max-width: 550px; margin: 20px auto; padding: 25px; border: 1px solid #000; text-align: left; }
        .inst-box { border: 2px solid red; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; font-size: 20px; }
        th, td { border: 1px solid #888; padding: 10px; }
        .b-clr { color: var(--blue); }
        .s-clr { color: var(--red); }

        @media print {
            body { background: white; }
            .no-print, .master-header, .mummy-daddy, .omniverse-tag, .workspace, .btn-row, .grid-49 { display: none !important; }
            #report { display: block !important; border: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="master-header">
        <span>YouTube: True X Profit</span>
        <span>vvvictoryvishnu@gmail.com</span>
    </div>

    <div class="mummy-daddy">MUMMY DADDY</div>
    <div class="omniverse-tag">OMNIVERSE THEORY</div>

    <div class="workspace">
        <div class="input-label">INPUT DATA</div>
        <textarea id="mainInput" placeholder="Symbol, Date, Time, OHLC..."></textarea>
        
        <div class="grid-49" id="pGrid"></div>

        <div class="status-bar" id="stat">SCANNING 3,62,880 PERMUTATIONS... PLEASE WAIT</div>

        <div class="btn-row">
            <button class="btn-clear" onclick="location.reload()">CLEAR</button>
            <button class="btn-run" onclick="startMasterScan()">RUN MASTER SCAN</button>
        </div>
    </div>

    <div id="report">
        <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:bold; border-bottom:1px solid #000;">
            <span>YouTube: True X Profit</span>
            <span>admin@truexprofit.com</span>
        </div>
        <h3 style="text-align:center; color:#1a237e; margin:10px 0;">OMNIVERSE THEORY PRECISION REPORT</h3>
        <div id="hDisp" style="font-size:10px; background:#f5f5f5; padding:8px; border:1px solid #ddd; margin-bottom:10px; font-weight:bold;"></div>
        <div id="instVerdict" class="inst-box"></div>
        <table id="rTable">
            <thead><tr style="background:#eee;"><th>PART ID</th><th>MATRIX RESULT</th></tr></thead>
            <tbody id="rBody"></tbody>
            <tr style="background:#f0f7ff;"><td>TOTAL</td><td id="totVal"></td></tr>
        </table>
        <p style="text-align:center; font-size:11px; margin-top:20px; font-weight:bold; border-top:1px solid #000; padding-top:10px;">
            Dedicated to MUMMY DADDY | Date: <span id="rDate"></span>
        </p>
        <button class="no-print" onclick="window.print()" style="width:100%; padding:12px; margin-top:15px; font-weight:bold; cursor:pointer;">SAVE / PRINT REPORT</button>
    </div>

    <script>
        let primes = [];
        let selectedParts = [];

        function init() {
            let lim=500000; let s=new Uint8Array(lim).fill(1);
            for(let i=2;i*i<lim;i++) if(s[i]) for(let j=i*i;j<lim;j+=i) s[j]=0;
            for(let i=2;i<lim;i++) if(s[i]) primes.push(i);

            const g = document.getElementById('pGrid');
            for(let i=1; i<=49; i++) {
                let b = document.createElement('div');
                b.className = 'part-btn unlocked';
                b.id = 'p-'+i; b.innerText = 'PART '+i;
                b.onclick = () => {
                    b.classList.toggle('active-p');
                    if(selectedParts.includes(i)) selectedParts = selectedParts.filter(p=>p!==i);
                    else selectedParts.push(i);
                };
                g.appendChild(b);
            }
        }
        init();

        function startMasterScan() {
            const raw = document.getElementById('mainInput').value;
            if(!raw || selectedParts.length === 0) return;

            document.getElementById('stat').style.display = 'block';
            
            setTimeout(() => {
                let pNums = [];
                raw.split('\n').forEach(ln => {
                    let d = ln.replace(/\D/g, ''); if(d) pNums.push(parseInt(d));
                });

                let base = (pNums.slice(0,4).reduce((a,b)=>a+b, 0) * 2) * 100;
                let results = [];

                selectedParts.sort((a,b)=>a-b).forEach(pid => {
                    let b=0, s=0;
                    for(let i=0; i<3000; i++) {
                        let target = base + (i * 123);
                        let p = primes[(i + pid * 150) % primes.length];
                        let chk = (target % p === 0) ? Math.floor(target/p) : (target % p);
                        if(chk % 2 !== 0) b++; else s++;
                    }
                    results.push({id: pid, val: (b >= s ? "B" : "S")});
                });

                showReport(raw.replace(/\n/g, ' | '), results);
            }, 800);
        }

        function showReport(hist, res) {
            document.getElementById('hDisp').innerText = "HISTORY: " + hist;
            let finalV = res.filter(r=>r.val==="B").length >= (res.length/2) ? "B" : "S";
            const iv = document.getElementById('instVerdict');
            iv.innerText = "? INSTITUTIONAL " + (finalV === "B" ? "BUY" : "SELL");
            iv.style.color = iv.style.borderColor = (finalV === "B" ? "blue" : "red");

            let html = "";
            res.forEach(r => {
                html += `<tr><td>PART ${r.id}</td><td class="${r.val==='B'?'b-clr':'s-clr'}">${r.val}</td></tr>`;
            });
            document.getElementById('rBody').innerHTML = html;
            document.getElementById('totVal').innerText = finalV;
            document.getElementById('totVal').className = (finalV==='B'?'b-clr':'s-clr');
            document.getElementById('rDate').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('report').style.display = "block";
            document.getElementById('stat').style.display = 'none';
        }
    </script>
</body>
</html>
