<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE V12 - TRUE X PROFIT</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 0; text-align: center; }
        .master-header { border-bottom: 2px solid #333; padding: 10px 20px; display: flex; justify-content: space-between; color: #00ff44; font-size: 13px; font-weight: bold; }
        .mummy-daddy { color: var(--gold); font-size: 45px; font-weight: 900; margin: 15px 0; }
        .omniverse-tag { color: var(--neon); font-size: 18px; font-weight: bold; letter-spacing: 5px; margin-bottom: 20px; }
        .workspace { display: flex; flex-direction: column; align-items: center; }
        textarea { width: 95%; max-width: 500px; height: 120px; background: #000; color: #00ff44; border: 1px solid #333; padding: 10px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 17px; margin-top: 15px; }
        .btn-row { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .btn-run { padding: 15px 40px; background: #004d40; color: white; border: 2px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 15px 25px; background: #440000; color: white; border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }
        #report { display: none; background: white; color: black; width: 650px; margin: 20px auto; padding: 25px; border: 2px solid #000; text-align: left; }
        .rep-top { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; border-bottom: 2.5px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        .hist-box { font-size: 14px; background: #f2f2f2; padding: 10px; border: 1.5px solid #000; margin-bottom: 15px; font-weight: bold; word-break: break-all; line-height: 1.4; }
        .inst-signal { border: 4px solid red; padding: 15px; text-align: center; font-size: 26px; font-weight: 900; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; table-layout: fixed; }
        table td, table th { border: 1px solid #999; padding: 10px; }
        .b-clr { color: var(--blue); } .s-clr { color: var(--red); }
        .total-cell { background: #e3f2fd; border-top: 2.5px solid #000 !important; }
        @media print { .no-print, .master-header, .mummy-daddy, .omniverse-tag, textarea, .btn-row { display: none !important; } #report { display: block !important; border: none; margin: 0; width: 100%; } }
    </style>
</head>
<body>
    <div class="master-header">
        <span>YouTube: True X Profit | admin@truexprofit.com</span>
        <span>vvvictoryvishnu@gmail.com</span>
    </div>
    <div class="mummy-daddy">MUMMY DADDY</div>
    <div class="omniverse-tag">OMNIVERSE THEORY - V12</div>
    <div class="workspace">
        <textarea id="mainInput" placeholder="PASTE DATA HERE"></textarea>
        <div class="btn-row no-print">
            <button class="btn-clear" onclick="document.getElementById('mainInput').value=''; document.getElementById('report').style.display='none';">CLEAR</button>
            <button class="btn-run" onclick="runScan()">RUN MASTER SCAN</button>
        </div>
    </div>
    <div id="report">
        <div class="rep-top">
            <span>YouTube: True X Profit</span>
            <span>vvvictoryvishnu@gmail.com</span>
        </div>
        <h3 style="text-align:center; margin:10px 0;">GLOBAL PRECISION 15x5 MATRIX REPORT</h3>
        <div id="histDisp" class="hist-box"></div>
        <div id="instVerdict" class="inst-signal"></div>
        <table id="resTable"></table>
        <p style="text-align:center; font-size:12px; margin-top:25px; font-weight:bold; border-top: 1px solid #000; padding-top: 10px;">Dedicated to MUMMY DADDY</p>
        <button class="btn-run no-print" style="width:100%; background:white; color:black; margin-top:15px;" onclick="window.print()">PRINT / SAVE REPORT</button>
    </div>

    <script>
        const API_URL = "http://46.202.162.155:5000/omniverse_scan";
        async function runScan() {
            const raw = document.getElementById('mainInput').value.trim();
            if(!raw) return;
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({input: raw})
                });
                const data = await response.json();
                if(data.matrix) renderTable(raw, data.matrix);
            } catch(e) { alert("Please click http://46.202.162.155:5000 once in new tab to allow connection."); }
        }

        function renderTable(raw, matrix) {
            document.getElementById('histDisp').innerText = "HISTORY: " + raw.replace(/\n/g, ' | ').toUpperCase();
            const divs = ["1", "4", "7", "9", "13"];
            const maj = (l) => l.filter(x => x==="B").length >= l.filter(x => x==="S").length ? "B" : "S";
            const clr = (v) => v === "B" ? "b-clr" : "s-clr";

            let html = "<tr><th>LAYER</th><th>D1</th><th>D2</th><th>D3</th><th>D4</th><th>D5</th><th>VERDICT</th></tr>";
            let logicVerdicts = [];
            for(let i=0; i<15; i++) {
                let row = divs.map(d => matrix[d][i]);
                let v = maj(row); logicVerdicts.push(v);
                html += `<tr><td>L${i+1}</td>` + row.map(val => `<td class="${clr(val)}">${val}</td>`).join('') + `<td style="background:#f9f9f9;" class="${clr(v)}">${v}</td></tr>`;
            }
            
            // Total Row
            html += "<tr class='total-cell'><td>TOTAL</td>";
            divs.forEach(d => {
                let v = maj(matrix[d]);
                html += `<td class="${clr(v)}">${v}</td>`;
            });
            let grandV = maj(logicVerdicts);
            html += `<td class="${clr(grandV)}" style="font-size:24px;">${grandV}</td></tr>`;
            
            document.getElementById('resTable').innerHTML = html;
            const iv = document.getElementById('instVerdict');
            iv.innerText = (grandV === "B" ? "↑ INSTITUTIONAL BUY" : "↓ INSTITUTIONAL SELL");
            iv.style.color = iv.style.borderColor = (grandV === "B" ? "blue" : "red");
            document.getElementById('report').style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
