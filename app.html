<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIVERSE THEORY - MASTER SYSTEM</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #ff4444; --blue: #4444ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; padding: 10px; text-align: center; }
        
        .mummy-daddy { color: var(--gold); font-size: 38px; font-weight: 900; margin: 10px 0; }
        .logo-sub { color: var(--neon); font-size: 18px; font-weight: bold; letter-spacing: 3px; margin-bottom: 20px; }

        /* இன்புட் பாக்ஸ் - பாதி அகலம் */
        textarea { width: 50%; height: 130px; background: #000; color: #00ff44; border: 1px solid #333; padding: 10px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 15px; }

        /* 49 Parts Grid */
        .master-grid { margin: 20px auto; width: 95%; max-width: 900px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .part-box { background: #111; border: 1px solid #222; padding: 10px 2px; border-radius: 3px; font-size: 10px; font-weight: bold; color: #444; cursor: not-allowed; }
        .unlocked { border: 1px solid var(--neon); color: var(--neon); cursor: pointer; }
        .active-part { background: var(--neon) !important; color: black !important; }

        /* பட்டன்கள் */
        .btn-row { margin: 20px 0; display: flex; justify-content: center; gap: 15px; }
        .btn-run { padding: 15px 40px; background: #004d40; color: white; border: 2px solid var(--neon); border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-clear { padding: 15px 25px; background: #440000; color: white; border: 1px solid var(--red); border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* ரிப்போர்ட் டிசைன் */
        #report { display: none; background: white; color: black; padding: 20px; width: 90%; max-width: 500px; margin: 20px auto; border: 1px solid #000; text-align: left; }
        .inst-box { border: 3px solid red; padding: 12px; text-align: center; font-size: 20px; font-weight: bold; margin: 15px 0; }
        .admin-txt { color: #d32f2f; font-weight: bold; font-size: 11px; margin-bottom: 10px; display: none; }
        
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; font-size: 16px; }
        th, td { border: 1px solid #aaa; padding: 8px; }
        .b-clr { color: var(--blue); }
        .s-clr { color: var(--red); }

        @media print {
            body * { display: none; }
            #report, #report * { display: block; }
        }
    </style>
</head>
<body>

    <div class="mummy-daddy">MUMMY DADDY</div>
    <div class="logo-sub">OMNIVERSE THEORY</div>

    <textarea id="mainInput" placeholder="PASTE TRADING DATA HERE..."></textarea>
    
    <div class="master-grid" id="grid49"></div>

    <div class="btn-row">
        <button class="btn-clear" onclick="clearAll()">CLEAR</button>
        <button class="btn-run" onclick="processOmniverse()">RUN MASTER SCAN</button>
    </div>

    <!-- ரிப்போர்ட் -->
    <div id="report">
        <div style="font-size: 10px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #000;">
            <span>YouTube: True X Profit</span>
            <span>vvvictoryvishnu@gmail.com</span>
        </div>
        <h3 style="text-align: center; margin: 10px 0; color: #1a237e;">OMNIVERSE THEORY REPORT</h3>
        
        <div id="adminView" class="admin-txt">ADMIN: BASE VALUE = <span id="baseVal"></span></div>
        <div id="instBox" class="inst-box"></div>

        <table>
            <thead><tr style="background:#eee;"><th>PART</th><th>RESULT</th><th>PART</th><th>RESULT</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>

        <p style="text-align:center; font-size:10px; margin-top:15px; font-weight:bold; border-top: 1px solid #000;">
            Dedicated to MUMMY DADDY | Date: <span id="repDate"></span>
        </p>
        <button onclick="window.print()" style="width:100%; padding:10px; margin-top:10px; font-weight:bold; cursor:pointer;">SAVE / PRINT REPORT</button>
    </div>

    <script>
        let isAdmin = true; // அட்மினாக இருந்தால் BASE தெரியும்
        const grid = document.getElementById('grid49');
        
        // 49 பார்ட்டுகளை உருவாக்குதல்
        for(let i=1; i<=49; i++) {
            let div = document.createElement('div');
            div.className = 'part-box unlocked'; // இப்போதைக்கு எல்லாம் அன்லாக்
            div.id = 'p' + i;
            div.innerText = 'P' + i;
            grid.appendChild(div);
        }

        function clearAll() {
            document.getElementById('mainInput').value = "";
            document.getElementById('report').style.display = "none";
        }

        function processOmniverse() {
            const input = document.getElementById('mainInput').value.trim();
            if(!input) { alert("Paste data first!"); return; }

            // 100% துல்லியமான BASE கணக்கீடு
            let nums = input.replace(/\D/g, "");
            let rawSum = 0;
            if(nums) rawSum = Array.from(nums).reduce((a, b) => parseInt(a) + parseInt(b), 0);
            let base = (rawSum * 100) + 93076600; // ரகசிய சூத்திரம்

            if(isAdmin) {
                document.getElementById('adminView').style.display = 'block';
                document.getElementById('baseVal').innerText = base;
            }

            // 49 விடைகளை உருவாக்குதல் (Logic)
            let results = [];
            for(let i=1; i<=49; i++) {
                results.push((base + i) % 2 === 0 ? "B" : "S");
            }

            // அட்டவணையை நிரப்புதல் (2 காலம்களாக)
            let html = "";
            for(let i=0; i<results.length; i+=2) {
                let r1 = results[i];
                let r2 = results[i+1] || "-";
                html += `<tr>
                    <td>P${i+1}</td><td class="${r1=='B'?'b-clr':'s-clr'}">${r1}</td>
                    <td>P${i+2}</td><td class="${r2=='B'?'b-clr':'s-clr'}">${r2}</td>
                </tr>`;
            }
            document.getElementById('tableBody').innerHTML = html;

            // Institutional Verdict
            let bCount = results.filter(x => x === "B").length;
            let finalV = bCount >= 25 ? "BUY" : "SELL";
            let inst = document.getElementById('instBox');
            inst.innerText = "? INSTITUTIONAL " + finalV;
            inst.style.color = inst.style.borderColor = (finalV === "BUY" ? "blue" : "red");

            document.getElementById('report').style.display = "block";
            document.getElementById('repDate').innerText = new Date().toLocaleDateString();
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
