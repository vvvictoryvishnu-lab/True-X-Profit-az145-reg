<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>OMNIVERSE MASTER V16</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; text-align: center; }
        .mummy-daddy { color: var(--gold); font-size: 35px; font-weight: 900; margin: 10px 0; }
        .header { border-bottom: 2px solid #333; padding: 10px; display: flex; justify-content: space-between; font-size: 13px; color: #00ff44; font-weight: bold; }
        
        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background:#111; padding:35px; border:2px solid var(--neon); border-radius:15px; width:300px; box-shadow: 0 0 25px var(--neon); }
        input { width:90%; padding:12px; margin:10px 0; background:#000; border:1px solid #444; color:var(--neon); text-align:center; border-radius:5px; font-weight:bold; }

        textarea { width: 60%; height: 110px; background: #000; color: #00ff44; border: 1.5px solid var(--neon); padding: 10px; border-radius: 8px; font-size: 17px; margin-top: 15px; }
        .btn-row { margin: 15px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-mode { border: 1.5px solid var(--gold); background: transparent; color: var(--gold); }
        .btn-mode.active { background: var(--gold); color: black; }
        .btn-run { background: #004d40; color: white; border: 2px solid var(--neon); font-size: 16px; padding: 15px 40px; }
        .btn-clear { background: #440000; color: white; border: 1px solid var(--red); }
        .status { background: var(--gold); color: black; padding: 8px; font-weight: bold; width: 60%; margin: 10px auto; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div id="gate">
        <div class="mummy-daddy">MUMMY DADDY</div>
        <div class="login-box">
            <h3 style="color:var(--neon)">SYSTEM ACTIVATION</h3>
            <input type="email" id="uMail" placeholder="Registered Email">
            <input type="password" id="uKey" placeholder="Access Key">
            <button class="btn btn-run" style="width:100%" onclick="login()">ENTER</button>
        </div>
    </div>

    <div id="app-main" style="display:none;">
        <div class="header"><span>YouTube: True X Profit</span><span id="userDisp"></span><span>admin@truexprofit.com</span></div>
        <div class="mummy-daddy">MUMMY DADDY</div>
        <textarea id="dataInput" placeholder="PASTE DATA HERE"></textarea>
        <div class="btn-row">
            <button class="btn btn-mode active" id="m81" onclick="setM(81,9,9)">81 (9x9)</button>
            <button class="btn btn-mode" id="m240" onclick="setM(240,16,15)">240 (16x15)</button>
            <button class="btn btn-mode" id="m252" onclick="setM(252,12,21)">252 (12x21)</button>
            <button class="btn btn-mode" style="border-color:#00ff44; color:#00ff44;" id="mall" onclick="setM('all',0,0)">ALL (3-IN-1 PRINT)</button>
        </div>
        <div class="status" id="st">CONNECTING TO MASTER VPS...</div>
        <div class="btn-row">
            <button class="btn btn-clear" onclick="document.getElementById('dataInput').value=''">CLEAR</button>
            <button class="btn btn-run" onclick="runScan()">RUN MASTER SCAN</button>
        </div>
    </div>

    <script>
        const FB_URL = "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/";
        let mode=81, c=9, r=9;

        async function login() {
            const email = document.getElementById('uMail').value.trim().toLowerCase();
            const key = document.getElementById('uKey').value.trim();
            const res = await fetch(`${FB_URL}/users/${email.replace(/\./g, '_')}.json`);
            const data = await res.json();
            if(data && data.key === key && data.status === "active") {
                document.getElementById('gate').style.display='none';
                document.getElementById('app-main').style.display='block';
                document.getElementById('userDisp').innerText = email;
            } else { alert("Access Denied!"); }
        }

        function setM(m,cols,rows){ mode=m; c=cols; r=rows; document.querySelectorAll('.btn-mode').forEach(b=>b.classList.remove('active')); document.getElementById(m==='all'?'mall':'m'+m).classList.add('active'); }
        
        async function runScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            document.getElementById('st').style.display='block';
            try {
                const res = await fetch("http://46.202.162.155:5000/triple_scan", {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({input:raw, mode:mode})
                });
                const data = await res.json();
                if(data.results) openPrint(raw, data.results);
            } catch(e) { alert("Please click http://46.202.162.155:5000 once in new tab to allow connection."); }
            finally { document.getElementById('st').style.display='none'; }
        }

        function getTbl(res, cols, rows) {
            const maj = (l) => {
                let b=l.filter(x=>x==="B").length, s=l.filter(x=>x==="S").length;
                return b>s?"B":(s>b?"S":"=");
            };
            const clr = (v) => v==="B"?"blue":v==="S"?"red":"black";
            let html = "<table border='1' style='width:100%; border-collapse:collapse; text-align:center; font-weight:bold; font-size:15px;'><tr><th>L/D</th>";
            for(let i=1; i<=cols; i++) html += `<th>${i<10?'0':''}${i}</th>`;
            html += "<th style='background:#e3f2fd'>TO</th></tr>";

            let colD = Array.from({length:cols},()=>[]), rMaj=[];
            for(let i=0; i<rows; i++) {
                let row = res.slice(i*cols, (i+1)*cols);
                let rv = maj(row); rMaj.push(rv);
                html += `<tr><td style='background:#eee'>${(i+1)<10?'0':''}${i+1}</td>`;
                row.forEach((v, idx) => { colD[idx].push(v); html += `<td style='color:${clr(v)}'>${v}</td>`; });
                html += `<td style='background:#e3f2fd; color:${clr(rv)}'>${rv}</td></tr>`;
            }
            html += "<tr style='background:#e3f2fd'><td>TO</td>";
            let toRow = colD.map(col => { let v = maj(col); html += `<td style='color:${clr(v)}'>${v}</td>`; return v; });
            let matrixVerdict = maj(toRow);
            html += `<td style='border:2px solid #000; font-size:18px; color:${clr(matrixVerdict)}'>${matrixVerdict}</td></tr></table>`;
            return { html: html, verdict: matrixVerdict };
        }

        function openPrint(raw, results) {
            const win = window.open('', '_blank');
            const h = raw.replace(/\n/g, ' | ').toUpperCase();
            const maj = (l) => l.filter(x=>x==="B").length >= l.filter(x=>x==="S").length ? "B" : "S";
            const clr = (v) => v==="B"?"blue":v==="S"?"red":"black";

            let body = "";
            let kuVerdict = "";

            if(mode === "all") {
                const r81 = getTbl(results["81"], 9, 9);
                const r240 = getTbl(results["240"], 16, 15);
                const r252 = getTbl(results["252"], 12, 21);
                kuVerdict = maj([r81.verdict, r240.verdict, r252.verdict]);
                body = r81.html + "<div style='page-break-after:always;'></div>" + r240.html + "<div style='page-break-after:always;'></div>" + r252.html;
            } else {
                const rSingle = getTbl(results, c, r);
                kuVerdict = rSingle.verdict;
                body = rSingle.html;
            }

            win.document.write(`<html><head><style>body{font-family:Arial; padding:20px; text-align:center;} .hist{font-size:15px; border:2px solid #000; padding:10px; margin-bottom:15px; font-weight:900; text-align:left; word-break:break-all;} .ku-box{border:3px solid #28a745; padding:10px; margin-top:10px; font-size:22px; font-weight:900; color:${clr(kuVerdict)}; display:inline-block; width:95%;}</style></head><body>
                <div style='display:flex; justify-content:space-between; font-size:12px; font-weight:bold;'><span>YouTube: True X Profit</span><span>admin@truexprofit.com</span></div>
                <h3>GLOBAL PRECISION MATRIX REPORT</h3>
                <div class="hist">HISTORY: ${h}</div>
                ${body}
                <div class="ku-box"> 3KU TOTAL  = ${kuVerdict} </div>
                <p style='font-size:11px; margin-top:20px;'>Dedicated to MUMMY DADDY | Date: ${new Date().toLocaleDateString('en-GB')}</p>
                <button onclick='window.print()' style='width:100%; padding:15px; font-weight:bold; cursor:pointer;'>PRINT / SAVE PDF</button>
            </body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
