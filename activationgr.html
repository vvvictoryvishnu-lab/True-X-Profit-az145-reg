<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate True X Profit - Professional Access</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      text-align: center;
      padding: 60px 20px;
    }
    .card {
      max-width: 480px;
      margin: 0 auto;
      background: #111;
      padding: 50px 40px;
      border-radius: 16px;
      border: 1px solid #00ff9d;
      box-shadow: 0 0 30px rgba(0, 255, 157, 0.2);
    }
    h1 {
      color: #00ff9d;
      margin-bottom: 10px;
    }
    input {
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: white;
      font-size: 1.1rem;
    }
    .btn {
      width: 100%;
      padding: 18px;
      background: #00ff9d;
      color: #000;
      font-size: 1.3rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      margin-top: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>TRUE X PROFIT</h1>
    <h2>System Activation</h2>
    <p style="margin:20px 0; color:#aaa;">Enter your details to activate</p>
    
    <input type="email" placeholder="Enter Your Email Address" required>
    <input type="tel" placeholder="Cell Number (Optional)" >
    <input type="text" placeholder="Access Key (If you have one)">
    
    <button class="btn" onclick="alert('✅ Activation Successful! Welcome to True X Profit Omniverse')">ACTIVATE NOW</button>
    
    <p style="margin-top:30px; font-size:0.9rem; color:#666;">

    </p>
  </div>

</body>
