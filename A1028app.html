<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZAXS 243 OMNIVERSE</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; text-align: center; }
        
        /* 1. Login Gate */
        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9000; }
        .login-box { background:#111; padding:35px; border:2px solid var(--neon); border-radius:15px; width:310px; box-shadow: 0 0 25px var(--neon); }
        input { width:90%; padding:14px; margin:10px 0; background:#000; border:1px solid #444; color:var(--neon); text-align:center; border-radius:5px; font-weight:bold; font-size:18px; }

        /* 2. Main UI */
        #main-app { display:none; padding:15px; }
        .mummy-daddy { color: var(--gold); font-size: 45px; font-weight: 900; margin: 10px 0; }
        .header-top { border-bottom: 2px solid #333; padding: 10px 20px; color: #00ff44; font-size: 13px; display: flex; justify-content: space-between; font-weight: bold; }

        /* Input Box - Half width on Desktop */
        textarea { width: 95%; max-width: 500px; height: 120px; background: #000; color: #00ff44; border: 2px solid #333; padding: 10px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 18px; margin: 15px 0; }
        
        .btn-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .btn-run { padding: 15px 40px; background: #004d40; color: white; border: 2px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 15px 25px; background: #440000; color: white; border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 3. Professional Report (Clean White) */
        #report { display: none; background: white; color: black; width: 680px; margin: 20px auto; padding: 25px; border: 2.5px solid #000; text-align: left; }
        .rep-info { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        
        /* BIG FONT for History */
        .hist-box { font-size: 18px; background: #f2f2f2; padding: 10px; border: 1px solid #000; margin-bottom: 15px; font-weight: 900; word-break: break-all; line-height: 1.5; color: #000; }
        
        .verdict-line { border: 4px solid red; padding: 15px; text-align: center; font-size: 26px; font-weight: 900; margin-bottom: 20px; }

        /* Mobile Scrollable Table */
        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; table-layout: fixed; }
        th, td { border: 1.5px solid #000; padding: 8px 2px; }
        th { background: #eee; font-size: 13px; }
        
        /* BIG FONT for B and S */
        .pid-num { font-size: 13px; color: #666; display: block; margin-bottom: -5px; }
        .r-val { font-size: 26px; display: block; font-weight: 900; }
        .b-clr { color: var(--blue); } .s-clr { color: var(--red); }
        
        .to-cell { background: #e3f2fd; border: 2.5px solid #000 !important; }
        .to-text { font-size: 28px !important; }

        @media print {
            body { background: white !important; }
            .no-print, #gate, .mummy-daddy, textarea, .btn-row, .header-top { display: none !important; }
            #report { display: block !important; border: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="gate">
        <div class="mummy-daddy">MUMMY DADDY</div>
        <div class="login-box">
            <h3 style="color:var(--neon)">AZAXS 243 ACTIVATION</h3>
            <input type="email" id="uMail" placeholder="Registered Email">
            <input type="password" id="uKey" placeholder="Access Key">
            <button class="btn-run" style="width:100%" onclick="login()">ENTER OMNIVERSE</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header-top">
            <span>YouTube: True X Profit</span>
            <span id="userDisp"></span>
            <span>admin@truexprofit.com</span>
        </div>
        <div class="mummy-daddy">MUMMY DADDY</div>

        <div class="workspace">
            <textarea id="dataInput" placeholder="PASTE ORIGINAL OHLC DATA HERE"></textarea>
            <div class="btn-row">
                <button class="btn-clear no-print" onclick="document.getElementById('dataInput').value=''; document.getElementById('report').style.display='none';">CLEAR</button>
                <button class="btn-run no-print" onclick="runScan()">RUN 243-MATRIX SCAN</button>
            </div>
        </div>

        <div id="report">
            <div class="rep-info">
                <span>YouTube: True X Profit</span>
                <span>vvvictoryvishnu@gmail.com</span>
                <span>VERSION: AZAXS_243</span>
            </div>
            <h3 style="text-align:center; margin:10px 0; color:#1a237e;">GLOBAL PRECISION 243-MATRIX REPORT</h3>
            <div id="histDisp" class="hist-box"></div>
            <div id="verdictBox" class="verdict-line"></div>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width:45px;">L/D</th>
                            <th>01</th><th>02</th><th>03</th><th>04</th><th>05</th><th>06</th><th>07</th><th>08</th><th>09</th>
                            <th class="to-cell">TO</th>
                        </tr>
                    </thead>
                    <tbody id="gridBody"></tbody>
                </table>
            </div>
            
            <p style="text-align:center; font-size:12px; margin-top:25px; font-weight:bold; border-top:1px solid #000; padding-top: 15px;">Dedicated to MUMMY DADDY | Date: <span id="rDate"></span></p>
            <button class="btn-run no-print" style="background:white; color:black; border:2px solid #000; width:100%; margin-top:20px;" onclick="window.print()">SAVE / PRINT REPORT</button>
        </div>
    </div>

    <script>
        const FB_URL = "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/";
        // ரகசிய சர்வர் லிங்க் (IP மற்றும் Port மறைக்கப்பட்டுள்ளது)
        const SERV_URL = "/mega_scan";

        async function login() {
            const email = document.getElementById('uMail').value.trim().toLowerCase();
            const key = document.getElementById('uKey').value.trim();
            if(!email || !key) return;
            const res = await fetch(`${FB_URL}/users/${email.replace(/\./g, '_')}.json`);
            const data = await res.json();
            if(data && data.key === key && data.status === "active") {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('userDisp').innerText = email;
            } else { alert("Unauthorized Access!"); }
        }

        async function runScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            try {
                const response = await fetch(SERV_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({input: raw})
                });
                const data = await response.json();
                if(data.results) renderReport(raw, data.results);
            } catch(e) { alert("Server Sync Error! Please refresh."); }
        }

        function renderReport(raw, results) {
            document.getElementById('histDisp').innerText = "HISTORY: " + raw.replace(/\n/g, ' | ').toUpperCase();
            const maj = (l) => l.filter(x=>x==="B").length >= l.filter(x=>x==="S").length ? "B" : "S";
            const clr = (v) => v === "B" ? "b-clr" : "s-clr";

            let html = "";
            let colData = [[],[],[],[],[],[],[],[],[]];
            let grandV = [];

            for(let r=0; r<27; r++) {
                let row = results.slice(r*9, (r+1)*9);
                let rowV = maj(row);
                grandV.push(rowV);
                html += `<tr><td style="background:#f2f2f2; font-size:11px;">${(r+1)<10?'0':''}${r+1}</td>`;
                row.forEach((v, c) => {
                    colData[c].push(v);
                    html += `<td><span class="r-val ${clr(v)}">${v}</span></td>`;
                });
                html += `<td class="to-cell"><span class="r-val ${clr(rowV)}">${rowV}</span></td></tr>`;
            }

            // Row 28: Vertical TO
            html += `<tr class="to-cell"><td>TO</td>`;
            colData.forEach(col => {
                let v = maj(col);
                html += `<td><span class="r-val to-text ${clr(v)}">${v}</span></td>`;
            });
            let finalV = maj(grandV);
            html += `<td><span class="r-val to-text ${clr(finalV)}" style="font-size:35px !important;">${finalV}</span></td></tr>`;

            document.getElementById('gridBody').innerHTML = html;
            const vb = document.getElementById('verdictBox');
            vb.innerText = "↑ INSTITUTIONAL " + (finalV==="B"?"BUY":"SELL");
            vb.style.color = vb.style.borderColor = (finalV==="B"?"blue":"red");
            document.getElementById('rDate').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('report').style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
