<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUE X MATRIX PRO - FINAL PROTOCOL</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; text-align: center; }
        
        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
        .login-box { background:#111; padding:35px; border:2px solid var(--neon); border-radius:15px; width:320px; box-shadow: 0 0 25px var(--neon); }
        input { width:90%; padding:12px; margin:10px 0; background:#000; border:1px solid #444; color:var(--neon); text-align:center; border-radius:5px; font-weight:bold; }

        #main-app { display:none; padding:10px; }
        .brand-header { border-bottom: 2px solid #333; padding: 10px; font-weight: bold; color: #00ff44; font-size: 13px; display: flex; justify-content: space-between; }
        .mummy-daddy { color: var(--gold); font-size: 45px; font-weight: 900; margin: 10px 0; }
        
        .workspace { display: flex; flex-direction: column; align-items: center; }
        textarea { width: 95%; max-width: 500px; height: 120px; background: #000; color: #00ff44; border: 2px solid #333; padding: 12px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 18px; }

        .mode-selection { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-mode { padding: 10px 15px; border: 1.5px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 12px; }
        .btn-mode.active { background: var(--gold); color: black; }

        .btn-row { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .btn-run { padding: 18px 45px; background: #004d40; color: white; border: 2.5px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-clear { padding: 18px 25px; background: #440000; color: white; border: 1px solid var(--red); border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Report Styles (A4 Clean) */
        #report-output { display: none; }
        .print-page { background: white; color: black; width: 700px; margin: 20px auto; padding: 30px; border: 2px solid #000; text-align: left; page-break-after: always; }
        .rep-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: 900; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
        .hist-box { font-size: 15px; background: #f9f9f9; padding: 10px; border: 1.5px solid #000; margin-bottom: 15px; font-weight: 900; word-break: break-all; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; table-layout: fixed; }
        th, td { border: 1.5px solid #000; padding: 6px 2px; vertical-align: middle; font-size: 15px; }
        th { background: #eee; }
        
        .b-clr { color: blue; } .s-clr { color: red; } .e-clr { color: black; }
        .to-row { background: #e3f2fd; font-weight: 900; }
        .final-verdict-box { text-align: right; font-size: 22px; font-weight: 900; margin-top: 10px; padding-right: 20px; }

        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            #report-output { display: block !important; }
            .print-page { border: none; margin: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <div id="gate" class="no-print">
        <div class="mummy-daddy">MUMMY DADDY</div>
        <div class="login-box">
            <input type="email" id="uMail" placeholder="Registered Email">
            <input type="password" id="uKey" placeholder="Access Key">
            <button class="btn-run" style="width:100%" onclick="login()">LOGIN</button>
        </div>
    </div>

    <div id="main-app">
        <div class="brand-header no-print">
            <span>YouTube: True X Profit</span>
            <span id="userDisp"></span>
            <span>admin@truexprofit.com</span>
        </div>
        <div class="mummy-daddy no-print">MUMMY DADDY</div>

        <div class="workspace no-print">
            <textarea id="dataInput" placeholder="PASTE DATA HERE"></textarea>
            
            <div class="mode-selection">
                <button class="btn-mode active" id="m81" onclick="setMode(81, 9, 9)">81 MATRIX (9x9)</button>
                <button class="btn-mode" id="m252" onclick="setMode(252, 12, 21)">252 MATRIX (12x21)</button>
                <button class="btn-mode" id="m240" onclick="setMode(240, 16, 15)">240 MATRIX (16x15)</button>
                <button class="btn-mode" id="mall" style="border-color:#00ff44; color:#00ff44;" onclick="setMode('all', 0, 0)">ALL (3 IN 1)</button>
            </div>

            <div class="btn-row">
                <button class="btn-clear" onclick="document.getElementById('dataInput').value=''">CLEAR</button>
                <button class="btn-run" onclick="runScan()">RUN MASTER SCAN</button>
            </div>
        </div>

        <div id="report-output"></div>
    </div>

    <script>
        let currentMode = 81, currentCols = 9, currentRows = 9;
        const FB_URL = "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/";
        const SERV_URL = "http://46.202.162.155:5000/triple_scan";

        async function login() {
            const email = document.getElementById('uMail').value.trim().toLowerCase();
            const key = document.getElementById('uKey').value.trim();
            const res = await fetch(`${FB_URL}/users/${email.replace(/\./g, '_')}.json`);
            const user = await res.json();
            if(user && user.key === key && user.status === "active") {
                document.getElementById('gate').style.display='none';
                document.getElementById('main-app').style.display='block';
                document.getElementById('userDisp').innerText = email;
            } else { alert("Denied!"); }
        }

        function setMode(m, c, r) {
            currentMode = m; currentCols = c; currentRows = r;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            if(m !== 'all') document.getElementById('m'+m).classList.add('active');
            else document.getElementById('mall').classList.add('active');
        }

        async function runScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            const res = await fetch(SERV_URL, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({input: raw, mode: currentMode})
            });
            const data = await res.json();
            if(data.results) generateFullReport(raw, data.results);
        }

        function generateFullReport(raw, results) {
            let container = document.getElementById('report-output');
            container.innerHTML = "";

            if(currentMode === "all") {
                container.innerHTML += createPage(raw, results["81"], 9, 9, "81 MATRIX");
                container.innerHTML += createPage(raw, results["240"], 16, 15, "240 MATRIX");
                container.innerHTML += createPage(raw, results["252"], 12, 21, "252 MATRIX");
            } else {
                container.innerHTML = createPage(raw, results, currentCols, currentRows, `${currentMode} MATRIX`);
            }
            window.print();
        }

        function createPage(raw, res, cols, rows, title) {
            const maj = (l) => {
                let b = l.filter(x=>x==="B").length;
                let s = l.filter(x=>x==="S").length;
                return b > s ? "B" : (s > b ? "S" : "=");
            };
            const clr = (v) => v === "B" ? "b-clr" : (v === "S" ? "s-clr" : "e-clr");

            let table = `<table><thead><tr><th>L/D</th>`;
            for(let i=1; i<=cols; i++) table += `<th>${i<10?'0':''}${i}</th></tr></thead><tbody>`;

            let colData = Array.from({length: cols}, () => []);
            for(let r=0; r<rows; r++) {
                let row = res.slice(r*cols, (r+1)*cols);
                table += `<tr><td style="background:#f2f2f2;">${(r+1)<10?'0':''}${r+1}</td>`;
                row.forEach((v, c) => {
                    colData[c].push(v);
                    table += `<td class="${clr(v)}">${v}</td>`;
                });
                table += `</tr>`;
            }

            // TO Row (Vertical Majority - RED BOX in your diagram)
            let toRowArray = [];
            table += `<tr class="to-row"><td>TO</td>`;
            colData.forEach(col => {
                let v = maj(col);
                toRowArray.push(v);
                table += `<td class="${clr(v)}">${v}</td>`;
            });
            table += `</tr></table>`;

            // Final Block Verdict (GREEN BOX in your diagram)
            let finalV = maj(toRowArray);
            let finalHtml = `<div class="final-verdict-box"> = <span class="${clr(finalV)}">${finalV}</span></div>`;

            return `
                <div class="print-page">
                    <div class="rep-header"><span>YouTube: True X Profit</span><span>vvvictoryvishnu@gmail.com</span></div>
                    <h2 style="text-align:center; margin:10px 0;">GLOBAL PRECISION ${title} REPORT</h2>
                    <div class="hist-box">HISTORY: ${raw.replace(/\n/g, ' | ').toUpperCase()}</div>
                    ${table}
                    ${finalHtml}
                    <p style="text-align:center; font-size:11px; margin-top:20px;">Dedicated to MUMMY DADDY | Date: ${new Date().toLocaleDateString('en-GB')}</p>
                </div>`;
        }
    </script>
</body>
</html>
