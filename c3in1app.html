<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>OMNIVERSE V15 - TRUE X PROFIT</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; text-align: center; }
        .mummy-daddy { color: var(--gold); font-size: 35px; font-weight: 900; margin: 10px 0; }
        .header { border-bottom: 2px solid #333; padding: 10px; display: flex; justify-content: space-between; font-size: 13px; color: #00ff44; font-weight: bold; }
        textarea { width: 60%; height: 110px; background: #000; color: #00ff44; border: 1px solid var(--neon); padding: 10px; border-radius: 8px; font-size: 17px; margin-top: 20px; }
        .btn-row { margin: 25px 0; }
        .btn { padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 15px; }
        .btn-run { background: #004d40; color: white; border: 2px solid var(--neon); }
        .btn-clear { background: #440000; color: white; border: 1px solid var(--red); }
        .status { background: var(--gold); color: black; padding: 8px; font-weight: bold; width: 60%; margin: 10px auto; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="header"><span>YouTube: True X Profit</span><span>admin@truexprofit.com</span></div>
    <div class="mummy-daddy">MUMMY DADDY</div>
    <textarea id="dataInput" placeholder="INPUT DATA"></textarea>
    <div class="btn-row">
        <button class="btn" style="border: 1px solid gold; color: gold; background:transparent" onclick="setM(81,9,9)">81 (9x9)</button>
        <button class="btn" style="border: 1px solid gold; color: gold; background:transparent" onclick="setM(252,12,21)">252 (12x21)</button>
        <button class="btn" style="border: 1px solid gold; color: gold; background:transparent" onclick="setM(240,16,15)">240 (16x15)</button>
        <button class="btn" style="border: 1px solid #00ff44; color: #00ff44; background:transparent" onclick="setM('all',0,0)">ALL PRINT</button>
    </div>
    <div class="status" id="st">CONNECTING TO MASTER VPS...</div>
    <div class="btn-row">
        <button class="btn btn-clear" onclick="document.getElementById('dataInput').value=''">CLEAR</button>
        <button class="btn btn-run" onclick="runScan()">RUN MASTER SCAN</button>
    </div>

    <script>
        let mode=81, cols=9, rows=9;
        function setM(m,c,r){ mode=m; cols=c; rows=r; alert("Mode Selected: "+m); }
        
        async function runScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            document.getElementById('st').style.display='block';
            try {
                const res = await fetch("http://46.202.162.155:5000/triple_scan", {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({input:raw, mode:mode})
                });
                const data = await res.json();
                openNewTab(raw, data.results);
            } catch(e) { alert("Error!"); }
            finally { document.getElementById('st').style.display='none'; }
        }

        function getTbl(res, c, r) {
            const maj = (l) => {
                let b=l.filter(x=>x==="B").length, s=l.filter(x=>x==="S").length;
                return b>s?"B":(s>b?"S":"=");
            };
            const clr = (v) => v==="B"?"blue":v==="S"?"red":"black";
            
            let html = "<table><tr><th>L/D</th>";
            for(let i=1; i<=c; i++) html += `<th>${i<10?'0':''}${i}</th>`;
            html += "<th>TO</th></tr>";

            let colD = Array.from({length:c},()=>[]), rMaj=[];
            for(let i=0; i<r; i++) {
                let row = res.slice(i*c, (i+1)*c);
                let rv = maj(row); rMaj.push(rv);
                html += `<tr><td>${(i+1)<10?'0':''}${i+1}</td>`;
                row.forEach((v, idx) => { colD[idx].push(v); html += `<td style="color:${clr(v)}">${v}</td>`; });
                html += `<td style="background:#f0f7ff; color:${clr(rv)}">${rv}</td></tr>`;
            }
            
            // The Horizontal TO row (Red Box logic)
            html += "<tr style='background:#f0f7ff;'><td>TO</td>";
            let toRow = colD.map(col => {
                let v = maj(col); html += `<td style="color:${clr(v)}">${v}</td>`; return v;
            });
            // THE GREEN BOX VERDICT (Majority of the TO row)
            let finalV = maj(toRow);
            html += `<td style="border:2.5px solid #000; font-size:24px; color:${clr(finalV)}">${finalV}</td></tr></table>`;
            // Special Green Box Display
            html += `<div style="text-align:right; font-size:22px; font-weight:900; margin-top:10px; color:${clr(finalV)}"> = ${finalV}</div>`;
            return html;
        }

        function openNewTab(raw, results) {
            const win = window.open('', '_blank');
            const h = raw.replace(/\n/g, ' | ').toUpperCase();
            let body = "";
            if(mode === "all") {
                body = "<h2>81 MATRIX</h2>"+getTbl(results["81"],9,9)+"<hr><h2>240 MATRIX</h2>"+getTbl(results["240"],16,15)+"<hr><h2>252 MATRIX</h2>"+getTbl(results["252"],12,21);
            } else {
                body = `<h2>${mode} MATRIX</h2>` + getTbl(results, cols, rows);
            }
            win.document.write(`<html><head><style>
                body{font-family:Arial; padding:20px; background:white; color:black;}
                .hist{font-size:15px; border:2px solid #000; padding:10px; margin-bottom:15px; font-weight:bold; word-break:break-all;}
                table{width:100%; border-collapse:collapse; text-align:center; font-weight:bold; font-size:15px;}
                th,td{border:1.5px solid #888; padding:5px;}
            </style></head><body>
                <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;"><span>YouTube: True X Profit</span><span>admin@truexprofit.com</span></div>
                <div class="hist">HISTORY: ${h}</div>
                ${body}
                <p style="text-align:center; font-weight:bold; margin-top:20px;">Dedicated to MUMMY DADDY | Date: ${new Date().toLocaleDateString('en-GB')}</p>
                <button onclick="window.print()" style="width:100%; padding:15px; font-weight:bold; cursor:pointer;">PRINT / SAVE PDF</button>
            </body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
