<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>OMNIVERSE V15 - TRUE X PROFIT</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: Arial; margin: 0; text-align: center; }
        .mummy-daddy { color: var(--gold); font-size: 35px; font-weight: 900; margin: 10px 0; }
        textarea { width: 60%; height: 110px; background: #000; color: #00ff44; border: 2px solid var(--neon); padding: 10px; border-radius: 8px; font-size: 17px; margin-top: 20px; }
        .btn-row { margin: 25px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-mode { border: 1.5px solid var(--gold); background: transparent; color: var(--gold); }
        .btn-mode.active { background: var(--gold); color: black; }
        .btn-run { background: #004d40; color: white; border: 2px solid var(--neon); }
        .btn-clear { background: #440000; color: white; border: 1px solid var(--red); }
        .status { background: var(--gold); color: black; padding: 10px; font-weight: bold; width: 60%; margin: 15px auto; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="mummy-daddy">MUMMY DADDY</div>
    <textarea id="dataInput" placeholder="PASTE DATA HERE"></textarea>
    <div class="btn-row">
        <button class="btn btn-mode active" id="m81" onclick="setM(81,9,9)">81 MATRIX</button>
        <button class="btn btn-mode" id="m252" onclick="setM(252,12,21)">252 MATRIX</button>
        <button class="btn btn-mode" id="m240" onclick="setM(240,16,15)">240 MATRIX</button>
        <button class="btn btn-mode" id="mall" onclick="setM('all',0,0)">ALL PRINT</button>
    </div>
    <div class="status" id="st">CONNECTING TO VPS...</div>
    <div class="btn-row">
        <button class="btn btn-clear" onclick="document.getElementById('dataInput').value=''">CLEAR</button>
        <button class="btn btn-run" onclick="runScan()">RUN MASTER SCAN</button>
    </div>

    <script>
        let mode=81, cols=9, rows=9;
        function setM(m,c,r){ 
            mode=m; cols=c; rows=r; 
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            document.getElementById(m==='all'?'mall':'m'+m).classList.add('active');
        }
        
        async function runScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            document.getElementById('st').style.display='block';
            try {
                const res = await fetch("http://46.202.162.155:5000/triple_scan", {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({input:raw, mode:mode})
                });
                const data = await res.json();
                openNewTab(raw, data.results);
            } catch(e) { alert("Server Connection Error!"); }
            finally { document.getElementById('st').style.display='none'; }
        }

        function getTbl(res, c, r) {
            const maj = (l) => {
                let b=l.filter(x=>x==="B").length, s=l.filter(x=>x==="S").length;
                return b>s?"B":(s>b?"S":"=");
            };
            const clr = (v) => v==="B"?"blue":v==="S"?"red":"black";
            let html = "<table><tr><th>L/D</th>";
            for(let i=1; i<=c; i++) html += `<th>${i<10?'0':''}${i}</th>`;
            html += "<th style='background:#e3f2fd; border:2px solid #000;'>TO</th></tr>";

            let colD = Array.from({length:c},()=>[]), rMaj=[];
            for(let i=0; i<r; i++) {
                let row = res.slice(i*c, (i+1)*c);
                let rv = maj(row); rMaj.push(rv);
                html += `<tr><td style='background:#f9f9f9; font-size:12px;'>${(i+1)<10?'0':''}${i+1}</td>`;
                row.forEach((v, idx) => { colD[idx].push(v); html += `<td style="color:${clr(v)}; font-size:15px;">${v}</td>`; });
                html += `<td style="background:#e3f2fd; border:1px solid #000; color:${clr(rv)}; font-size:15px;">${rv}</td></tr>`;
            }
            
            html += "<tr style='background:#e3f2fd; border-top:2px solid #000;'><td>TO</td>";
            let toRow = colD.map(col => {
                let v = maj(col); html += `<td style="color:${clr(v)}; font-size:15px;">${v}</td>`; return v;
            });
            let finalV = maj(toRow);
            html += `<td style="border:2.5px solid #000; font-size:24px; color:${clr(finalV)}">${finalV}</td></tr></table>`;
            html += `<div style="text-align:right; font-size:24px; font-weight:900; margin-top:10px; color:${clr(finalV)}"> = ${finalV}</div>`;
            return html;
        }

        function openNewTab(raw, results) {
            const win = window.open('', '_blank');
            const h = raw.replace(/\n/g, ' | ').toUpperCase();
            let body = "";
            if(mode === "all") {
                body = "<h2>81 MATRIX (9x9)</h2>"+getTbl(results["81"],9,9)+"<div style='page-break-after:always'></div>" +
                       "<h2>240 MATRIX (16x15)</h2>"+getTbl(results["240"],16,15)+"<div style='page-break-after:always'></div>" +
                       "<h2>252 MATRIX (12x21)</h2>"+getTbl(results["252"],12,21);
            } else {
                body = `<h2>${mode} MATRIX REPORT</h2>` + getTbl(results, cols, rows);
            }
            win.document.write(`<html><head><style>
                body{font-family:Arial; padding:20px; background:white; color:black; text-align:center;}
                .header{display:flex; justify-content:space-between; font-size:12px; font-weight:bold; border-bottom:2px solid #000; padding-bottom:5px;}
                .hist{font-size:15px; border:2px solid #000; padding:10px; margin:15px 0; font-weight:bold; word-break:break-all; text-align:left;}
                table{width:100%; border-collapse:collapse; text-align:center; font-weight:bold; margin:auto;}
                th,td{border:1px solid #888; padding:4px;}
            </style></head><body>
                <div class="header"><span>YouTube: True X Profit</span><span>admin@truexprofit.com</span></div>
                <div class="hist">HISTORY: ${h}</div>
                ${body}
                <p style="margin-top:20px;">Dedicated to MUMMY DADDY | Date: ${new Date().toLocaleDateString('en-GB')}</p>
                <button onclick="window.print()" style="width:100%; padding:15px; font-weight:bold; cursor:pointer;">PRINT / SAVE REPORT</button>
            </body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
