<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>OMNIVERSE WORLDWIDE - FINAL</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; text-align: center; }
        #gate { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
        .login-box { background:#111; padding:40px; border:2px solid var(--neon); border-radius:15px; width:300px; }
        input { width:90%; padding:12px; margin:10px 0; background:#000; border:1px solid #444; color:var(--neon); text-align:center; border-radius:5px; font-weight:bold; }
        #app-content { display:none; padding:15px; }
        .mummy-daddy { color: var(--gold); font-size: 35px; font-weight: 900; }
        textarea { width: 50%; height: 110px; background: #000; color: #00ff44; border: 2px solid var(--neon); padding: 12px; border-radius: 10px; font-family: 'Consolas', monospace; font-size: 17px; margin-top: 20px; }
        .mode-selection { margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
        .btn-mode { padding: 12px 20px; border: 1.5px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 12px; }
        .btn-mode.active { background: var(--gold); color: black; }
        .btn-run { padding: 18px 50px; background: #004d40; color: white; border: 2.5px solid var(--neon); border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gate">
        <div class="mummy-daddy">MUMMY DADDY</div>
        <div class="login-box"><input type="email" id="uMail" placeholder="Registered Email"><input type="password" id="uKey" placeholder="Access Key"><button class="btn-run" style="width:100%" onclick="login()">LOGIN</button></div>
    </div>
    <div id="app-content">
        <div class="mummy-daddy">MUMMY DADDY</div>
        <textarea id="dataInput" placeholder="PASTE DATA HERE"></textarea>
        <div class="mode-selection">
            <button class="btn-mode active" id="m81" onclick="setMode(81, 9, 9)">81 MATRIX (9x9)</button>
            <button class="btn-mode" id="m252" onclick="setMode(252, 12, 21)">252 MATRIX (12x21)</button>
            <button class="btn-mode" id="m240" onclick="setMode(240, 16, 15)">240 MATRIX (16x15)</button>
            <button class="btn-mode" style="border-color:#00ff44; color:#00ff44;" id="mall" onclick="setMode('all', 0, 0)">ALL (3 IN 1 PRINT)</button>
        </div>
        <button class="btn-run" onclick="runScan()">RUN MASTER SCAN</button>
    </div>
    <script>
        let currentMode = 81, currentCols = 9, currentRows = 9;
        const SERV_URL = "http://46.202.162.155:5000/triple_scan";
        const FB_URL = "https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/";

        async function login() {
            const email = document.getElementById('uMail').value.trim().toLowerCase();
            const key = document.getElementById('uKey').value;
            const res = await fetch(`${FB_URL}/users/${email.replace(/\./g, '_')}.json`);
            const user = await res.json();
            if(user && user.key === key && user.status === "active") {
                document.getElementById('gate').style.display='none';
                document.getElementById('app-content').style.display='block';
            } else { alert("Access Denied!"); }
        }

        function setMode(m, c, r) {
            currentMode = m; currentCols = c; currentRows = r;
            document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
            if(m !== 'all') document.getElementById('m'+m).classList.add('active');
            else document.getElementById('mall').classList.add('active');
        }

        async function runScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            const response = await fetch(SERV_URL, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({input: raw, mode: currentMode})
            });
            const data = await response.json();
            if(currentMode === "all") openCombined(raw, data.results);
            else openSingle(raw, data.results, currentMode, currentCols, currentRows);
        }

        function getTable(res, cols, rows) {
            const maj = (l) => {
                let b = l.filter(x=>x==="B").length, s = l.filter(x=>x==="S").length;
                return b > s ? "B" : (s > b ? "S" : "=");
            };
            const clr = (v) => v==="B"?"blue":v==="S"?"red":"black";
            let html = `<table><tr><th>L/D</th>`;
            for(let i=1; i<=cols; i++) html += `<th>${i<10?'0':''}${i}</th>`;
            html += `<th style='background:#f0f0f0; border:2px solid #000;'>TO</th></tr>`;
            let colD = Array.from({length: cols}, () => []), rowV = [];
            for(let r=0; r<rows; r++) {
                let row = res.slice(r*cols, (r+1)*cols), v = maj(row); rowV.push(v);
                html += `<tr><td>${(r+1)<10?'0':''}${r+1}</td>`;
                row.forEach((bit, c) => { colD[c].push(bit); html += `<td style="color:${clr(bit)}">${bit}</td>`; });
                html += `<td style="background:#f0f0f0; color:${clr(v)}">${v}</td></tr>`;
            }
            html += `<tr style="background:#f0f0f0;"><td>TO</td>`;
            colD.forEach(c => html += `<td style="color:${clr(maj(c))}">${maj(c)}</td>`);
            let final = maj(rowV);
            html += `<td style="font-size:24px; border:2px solid #000; color:${clr(final)}">${final}</td></tr></table>`;
            html += `<div style="text-align:right; font-size:24px; font-weight:900; margin-top:15px; padding-right:20px; border-top:2px solid #333; padding-top:10px;">= <span style="color:${clr(final)}">${final}</span></div>`;
            return html;
        }

        function openSingle(raw, res, mode, c, r) {
            const win = window.open('', '_blank');
            write(win, raw, `<h2>GLOBAL PRECISION ${mode} MATRIX</h2>` + getTable(res, c, r));
        }

        function openCombined(raw, all) {
            const win = window.open('', '_blank');
            let b = `<h2>81 MATRIX (9x9)</h2>${getTable(all["81"], 9, 9)}<div style="page-break-after:always;"></div>` +
                    `<h2>240 MATRIX (16x15)</h2>${getTable(all["240"], 16, 15)}<div style="page-break-after:always;"></div>` +
                    `<h2>252 MATRIX (12x21)</h2>${getTable(all["252"], 12, 21)}`;
            write(win, raw, b);
        }

        function write(win, raw, body) {
            win.document.write(`<html><head><style>
                body { font-family: Arial; padding: 30px; text-align: center; background: white; color: black; }
                .hist { font-size: 15px; border: 2px solid #000; padding: 12px; margin: 15px 0; font-weight: bold; word-break: break-all; text-align: left; background:#f9f9f9; }
                table { width: 100%; border-collapse: collapse; text-align: center; font-weight: bold; font-size: 15px; }
                th, td { border: 1px solid #000; padding: 6px; }
                h2 { border-bottom: 2px solid #000; padding-bottom: 10px; margin-top: 30px; }
            </style></head><body>
                <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; border-bottom:2px solid #000; padding-bottom:5px;"><span>YouTube: True X Profit</span><span>admin@truexprofit.com</span></div>
                ${body}<div class="hist">HISTORY: ${raw.replace(/\n/g, ' | ').toUpperCase()}</div>
                <p style="margin-top:40px; font-weight:bold; border-top:1px solid #000; padding-top:10px;">Dedicated to MUMMY DADDY | Date: ${new Date().toLocaleDateString('en-GB')}</p>
                <button onclick="window.print()" style="width:100%; padding:20px; font-weight:bold; margin-top:30px; cursor:pointer;">PRINT / SAVE PDF</button>
            </body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
