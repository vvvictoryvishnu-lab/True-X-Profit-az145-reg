<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>TRUE X MATRIX PRO - OMNIVERSE 3KU</title>
    <style>
        :root { --neon: #00E5FF; --gold: #FFD700; --bg: #050505; --red: #FF3131; --blue: #0070FF; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial; margin: 0; text-align: center; }
        .mummy-daddy { color: var(--gold); font-size: 35px; font-weight: 900; margin: 10px 0; }
        .brand { border-bottom: 2px solid #333; padding: 10px; display: flex; justify-content: space-between; font-size: 13px; color: #00ff44; }
        textarea { width: 60%; height: 110px; background: #000; color: #00ff44; border: 2px solid var(--neon); padding: 10px; border-radius: 8px; font-size: 17px; margin-top: 20px; }
        .btn-row { margin: 25px 0; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-run { background: #004d40; color: white; border: 2px solid var(--neon); }
        .btn-clear { background: #440000; color: white; border: 1px solid var(--red); }
        .status { background: var(--gold); color: black; padding: 8px; font-weight: bold; width: 60%; margin: 15px auto; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="brand"><span>YouTube: True X Profit</span><span>vvvictoryvishnu@gmail.com</span></div>
    <div class="mummy-daddy">MUMMY DADDY</div>
    <textarea id="dataInput" placeholder="PASTE DATA HERE"></textarea>
    
    <div class="status" id="stBox">CONNECTING TO MASTER VPS...</div>
    
    <div class="btn-row">
        <button class="btn btn-clear" onclick="document.getElementById('dataInput').value=''">CLEAR</button>
        <button class="btn btn-run" onclick="run3KUScan()">RUN ALL-IN-ONE 3KU SCAN</button>
    </div>

    <script>
        async function run3KUScan() {
            const raw = document.getElementById('dataInput').value.trim();
            if(!raw) return;
            document.getElementById('stBox').style.display='block';
            try {
                const res = await fetch("http://46.202.162.155:5000/scan_3ku", {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({input:raw})
                });
                const data = await res.json();
                if(data.results) openPrint(raw, data.results);
            } catch(e) { alert("Error!"); }
            finally { document.getElementById('stBox').style.display='none'; }
        }

        function getTbl(res, cols, rows) {
            const maj = (l) => {
                let b=l.filter(x=>x==="B").length, s=l.filter(x=>x==="S").length;
                return b>s?"B":(s>b?"S":"=");
            };
            const clr = (v) => v==="B"?"blue":v==="S"?"red":"black";
            
            let html = "<table border='1' style='width:100%; border-collapse:collapse; text-align:center; font-weight:bold; font-size:15px;'><tr><th>L/D</th>";
            for(let i=1; i<=cols; i++) html += `<th>${i<10?'0':''}${i}</th>`;
            html += "<th style='background:#e3f2fd'>TO</th></tr>";

            let colD = Array.from({length:cols},()=>[]), rMaj=[];
            for(let i=0; i<rows; i++) {
                let row = res.slice(i*cols, (i+1)*cols);
                let rv = maj(row); rMaj.push(rv);
                html += `<tr><td style='background:#eee'>${(i+1)<10?'0':''}${i+1}</td>`;
                row.forEach((v, idx) => { colD[idx].push(v); html += `<td style='color:${clr(v)}'>${v}</td>`; });
                html += `<td style='background:#e3f2fd; color:${clr(rv)}'>${rv}</td></tr>`;
            }
            
            html += "<tr style='background:#e3f2fd'><td>TO</td>";
            let toRow = colD.map(col => { let v = maj(col); html += `<td style='color:${clr(v)}'>${v}</td>`; return v; });
            let matrixVerdict = maj(toRow);
            html += `<td style='border:2px solid #000; font-size:18px; color:${clr(matrixVerdict)}'>${matrixVerdict}</td></tr></table>`;
            return { html: html, verdict: matrixVerdict };
        }

        function openPrint(raw, results) {
            const win = window.open('', '_blank');
            const h = raw.replace(/\n/g, ' | ').toUpperCase();
            
            const r81 = getTbl(results["81"], 9, 9);
            const r240 = getTbl(results["240"], 16, 15);
            const r252 = getTbl(results["252"], 12, 21);

            const maj = (l) => {
                let b=l.filter(x=>x==="B").length, s=l.filter(x=>x==="S").length;
                return b>s?"B":(s>b?"S":"=");
            };
            const clr = (v) => v==="B"?"blue":v==="S"?"red":"black";

            // 3 மேட்ரிக்ஸ் விடைகளின் மெஜாரிட்டி (3KU TOTAL)
            const kuVerdict = maj([r81.verdict, r240.verdict, r252.verdict]);

            win.document.write(`<html><head><style>
                body{font-family:Arial; padding:15px; background:white; color:black; text-align:center;}
                .hist{font-size:15px; border:1.8px solid #000; padding:8px; margin-bottom:10px; font-weight:900; text-align:left; word-break:break-all;}
                table{width:100%; border-collapse:collapse; text-align:center; font-weight:bold; font-size:15px; margin-bottom:20px;}
                th,td{border:1.1px solid #888; padding:3px;}
                .ku-box { border:3px solid #28a745; padding:10px; margin-top:10px; font-size:22px; font-weight:900; color:${clr(kuVerdict)}; display:inline-block; width:95%; }
            </style></head><body>
                <div style='display:flex; justify-content:space-between; font-size:12px; font-weight:bold;'><span>YouTube: True X Profit</span><span>vvvictoryvishnu@gmail.com</span></div>
                <h2 style='margin:10px 0;'>GLOBAL PRECISION 3KU MATRIX REPORT</h2>
                <div class="hist">HISTORY: ${h}</div>
                
                ${r81.html}
                <div style="page-break-after:always;"></div>
                ${r240.html}
                <div style="page-break-after:always;"></div>
                ${r252.html}
                
                <div class="ku-box"> 3KU TOTAL  = ${kuVerdict} </div>

                <p style='font-size:11px; margin-top:20px;'>Dedicated to MUMMY DADDY | Date: ${new Date().toLocaleDateString('en-GB')}</p>
                <button onclick='window.print()' style='width:100%; padding:15px; font-weight:bold; cursor:pointer;'>SAVE / PRINT PDF</button>
            </body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
