<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ 145 - MASTER REGISTRATION</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid gold; padding: 20px; border-radius: 15px; background: #111; max-width: 500px; margin: auto; }
        .true-x { border: 1px solid green; display: inline-block; padding: 5px 15px; color: gold; font-style: italic; font-weight: bold; margin-bottom: 5px; }
        
        /* Side by Side Layout */
        .row { display: flex; gap: 10px; margin: 10px 0; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: white; color: black; font-weight: bold; }
        .full-input { width: 95%; margin: 10px 0; }
        
        button { width: 98%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <div class="true-x">True X Profit</div>
        <h1 style="color:gold; margin: 5px 0;">AZ 145 MATRIX</h1>
        
        <div class="row">
            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="dob" placeholder="D.O.B">
        </div>

        <input type="email" id="email" class="full-input" placeholder="Email Address">
        <input type="tel" id="mobile" class="full-input" placeholder="WhatsApp Number">

        <div class="row">
            <input type="text" id="symbols" placeholder="Example: GOLD, BTC">
            <input type="text" id="place" placeholder="PLACE">
        </div>

        <button onclick="saveToMaster()">SUBMIT DETAILS</button>
        <p id="msg"></p>
    </div>

    <script>
        function saveToMaster() {
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const dob = document.getElementById('dob').value;
            const symbols = document.getElementById('symbols').value;
            const place = document.getElementById('place').value;
            const msgStatus = document.getElementById('msg');

            if(!name || !email || !mobile) { alert("Please fill all details!"); return; }

            const safe_mail = email.replace(/\./g, '_');
            const data = { 
                name, dob, mobile, symbols, place, 
                time: new Date().toLocaleString() 
            };

            // Firebase Save
            fetch(`https://az145-maste-default-rtdb.asia-southeast1.firebasedatabase.app/leads/${safe_mail}.json`, {
                method: 'PUT', body: JSON.stringify(data)
            }).then(() => {
                // Formspree Email Notification
                fetch("https://formspree.io/f/xojbzevz", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        subject: "NEW AZ 145 REGISTRATION",
                        message: `Name: ${name}\nDOB: ${dob}\nEmail: ${email}\nMobile: ${mobile}\nPlace: ${place}\nSymbol: ${symbols}`
                    })
                });
                msgStatus.innerHTML = "வெற்றிகரமாக அனுப்பப்பட்டது! மாஸ்டர் உங்களைத் தொடர்பு கொள்வார்.";
                msgStatus.style.color = "lime";
            });
        }
    </script>
</body>
</html>
